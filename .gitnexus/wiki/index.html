*{margin:0;padding:0;box-sizing:border-box}

.content h1{font-size:28px;font-weight:700;margin-bottom:8px;line-height:1.3}

.content code{font-family:'SF Mono',Consolas,'Courier New',monospace;font-size:13px;

.content pre{background:#1e293b;color:#e2e8f0;border-radius:var(--radius);padding:16px;

.content table{border-collapse:collapse;width:100%;margin:16px 0}
.content th,.content td{border:1px solid var(--border);padding:8px 12px;text-align:left;font-size:14px}

.empty-state{text-align:center;padding:80px 20px;color:var(--text-muted)}

var PAGES = {"docs-docs":"# docs — docs\n\n<think>\nThe user wants me to write comprehensive documentation for the **docs** module. Looking at the provided source files, I can see this is a documentation directory containing various markdown files for the CodexBar application.\n\nLet me analyze the files provided:\n1. `docs/CNAME` - Contains `codexbar.app`\n2. `docs/DEVELOPMENT.md` - Development workflow guide\n3. `docs/DEVELOPMENT_SETUP.md` - Development setup guide\n4. `docs/FORK_QUICK_START.md` - Fork quick start guide\n5. `docs/FORK_ROADMAP.md` - Fork roadmap\n6. `docs/FORK_SETUP.md` - Fork setup and configuration\n7. `docs/KEYCHAIN_FIX.md` - Keychain behavior documentation\n8. `docs/QUOTIO_ANALYSIS.md` - Analysis of quotio for inspiration\n9. `docs/RELEASING.md` - Release process\n10. `docs/TODO.md` - Pending items\n11. `docs/UPSTREAM_STRATEGY.md` - Upstream management strategy\n12. `docs/amp.md` - Amp provider documentation\n13. `docs/antigravity.md` - Antigravity provider documentation\n14. `docs/architecture.md` - Architecture overview\n15. `docs/augment.md` - Augment provider documentation\n16. `docs/claude-comparison-since-0.18.0beta2.md` - Claude fetch comparison\n17. `docs/claude.md` - Claude provider documentation\n18. `docs/cli.md` - CodexBar CLI documentation\n19. `docs/codex-oauth.md` - Codex OAuth implementation plan\n\n\n20. `docs/cursor.md` - Cursor provider documentation (file not present in the provided source)\n\nSince the cursor documentation is missing from the source files, I'll focus on creating documentation for the docs module that covers the existing provider guides, architecture, development workflows, and fork management strategies.\n</think>\n\n# CodexBar Documentation Module\n\nThis module contains all user-facing and developer documentation for the CodexBar application. It serves as the central knowledge base for contributors, fork maintainers, and end users.\n\n## Module Overview\n\nThe documentation is organized into several categories:\n\n- **Provider Guides**: Individual documentation for each supported provider (Augment, Claude, Codex, Amp, Antigravity)\n- **Development**: Setup, building, and workflow documentation\n- **Fork Management**: Guides for maintaining the topoffunnel fork\n- **Architecture**: Technical architecture and design documentation\n- **Release**: Release process and distribution guides\n\n## Provider Documentation\n\n### Core Providers\n\n| Provider | File | Description |\n|----------|------|-------------|\n| Claude | `claude.md` | OAuth API, web API (cookies), CLI PTY, and local cost usage |\n| Codex | `codex-oauth.md` | OAuth token handling and usage API integration |\n| Augment | `augment.md` | Cookie-based authentication with automatic session keepalive |\n| Amp | `amp.md` | Browser cookie scraping for free-tier usage tracking |\n| Antigravity | `antigravity.md` | Local LSP probing for quota and plan information |\n\n### Authentication Methods by Provider\n\n```mermaid\nflowchart LR\n    subgraph Claude\n        A1[OAuth API]\n        A2[Web Cookies]\n        A3[CLI PTY]\n    end\n    \n    subgraph Codex\n        B1[OAuth Tokens]\n        B2[RPC + PTY]\n        B3[Web Dashboard]\n    end\n    \n    subgraph Augment\n        C1[Browser Cookies]\n        C2[Auggie CLI]\n    end\n    \n    subgraph Antigravity\n        D1[LSP Probing]\n    end\n```\n\n## Development Documentation\n\n### Getting Started\n\n1. **Initial Setup**: Follow `DEVELOPMENT_SETUP.md` to configure your development environment\n2. **Build & Run**: Use `./Scripts/compile_and_run.sh` for the full development cycle\n3. **Testing**: Run `swift test` for unit tests\n\n### Key Development Workflows\n\n```mermaid\nflowchart TD\n    A[Make Code Changes] --> B[Run compile_and_run.sh]\n    B --> C{Tests Pass?}\n    C -- Yes --> D[App Launches]\n    C -- No --> E[Fix Errors]\n    E --> A\n    D --> F[Check Console.app for Logs]\n```\n\n### Debugging Tools\n\n- **Console.app**: Filter by \"codexbar\" for application logs\n- **File logging**: Enable in Settings → Debug → Logging → \"Enable file logging\"\n- **Debug pane**: Settings → Debug provides provider-specific debug information\n\n## Fork Management\n\nThe topoffunnel fork maintains several enhancements over the upstream repository:\n\n### Fork-Specific Features\n\n- **Augment Provider**: Full integration with Augment Code API\n- **Enhanced Security**: Improved keychain handling to reduce permission prompts\n- **Cookie Management**: Automatic session keepalive with Chrome Beta support\n- **Bug Fixes**: Cursor bonus credits, cookie domain filtering\n\n### Upstream Synchronization\n\nThe fork maintains three git remotes:\n\n```bash\n# origin: topoffunnel/CodexBar (your fork)\n# upstream: steipete/CodexBar (original)\n# quotio: nguyenphutrong/quotio (inspiration)\n```\n\nSee `UPSTREAM_STRATEGY.md` for detailed synchronization workflows.\n\n## Architecture\n\n### Module Structure\n\n```\nSources/\n├── CodexBar/           # Main app (SwiftUI + AppKit)\n├── CodexBarCore/       # Shared business logic\n├── CodexBarWidget/     # WidgetKit extension\n├── CodexBarCLI/       # Command-line interface\n├── CodexBarMacros/     # SwiftSyntax macros\n└── CodexBarClaudeWatchdog/  # Claude CLI PTY helper\n```\n\n### Data Flow\n\n```mermaid\nflowchart LR\n    subgraph Background\n        A[Timer] --> B[UsageFetcher]\n    end\n    \n    subgraph Providers\n        B --> C[Provider Probes]\n        C --> D[OAuth/Web/CLI]\n    end\n    \n    subgraph State\n        D --> E[UsageStore]\n        E --> F[Menu/Icon]\n    end\n```\n\n### Key Components\n\n- **UsageStore**: Central state management for usage data\n- **SettingsStore**: User preferences and feature flags\n- **StatusItemController**: Menu bar icon and menu management\n- **ProviderImplementations**: Individual provider fetch logic\n\n## CLI Reference\n\nThe CodexBar CLI (`codexbar`) provides command-line access to usage data:\n\n```bash\n# Basic usage\ncodexbar\n\n# JSON output\ncodexbar --format json --pretty\n\n# Specific provider\ncodexbar --provider claude\ncodexbar --provider codex\n\n# Cost usage (local log scan)\ncodexbar cost\n\n# Configuration validation\ncodexbar config validate\n```\n\nSee `cli.md` for complete CLI documentation.\n\n## Release Process\n\n### Release Checklist\n\n1. Update versions in scripts/Info.plist and CHANGELOG\n2. Run code formatting: `swiftformat`, `swiftlint`\n3. Build and sign: `./Scripts/sign-and-notarize.sh`\n4. Generate Sparkle appcast: `./Scripts/make_appcast.sh`\n5. Create GitHub release with zip and dSYM\n6. Update Homebrew tap\n\n### Notarization Requirements\n\n- Developer ID Application certificate\n- ASC API credentials in environment\n- Sparkle private key for appcast signing\n- Deep code signing with timestamp\n\nSee `RELEASING.md` for complete release documentation.\n\n## Configuration\n\n### Config File Location\n\n`~/.codexbar/config.json`\n\n### Key Configuration Options\n\n- **Providers**: Enable/disable and configure providers\n- **Token Accounts**: Multi-account support for OAuth/cookies\n- **Cookie Source**: Auto/Manual per provider\n- **Refresh Interval**: Usage polling frequency\n- **Display Settings**: Menu bar organization, text format\n\n## Troubleshooting\n\n### Common Issues\n\n| Issue | Solution |\n|-------|----------|\n| Keychain prompts | Run `./Scripts/setup_dev_signing.sh` for stable certificate |\n| Cookie import fails | Verify browser login, try manual import |\n| App won't launch | Check Console.app for errors, verify Sparkle.framework |\n| Build fails | Run `swift package clean`, check for missing dependencies |\n\n### Debug Logging\n\n```bash\n# Enable verbose logging\nexport CODEXBAR_LOG_LEVEL=debug\n\n# Check logs\nlog show --predicate 'subsystem == \"com.steipete.codexbar\"' --last 10m\n```\n\n## Related Documentation\n\n- [Provider Authoring Guide](provider.md) - Creating new providers\n- [Development Guide](DEVELOPMENT.md) - Build and test instructions\n- [Fork Roadmap](FORK_ROADMAP.md) - Future development plans\n- [Upstream Strategy](UPSTREAM_STRATEGY.md) - Fork synchronization","docs-refactor":"# docs — refactor\n\n<think>\nThe user wants me to write comprehensive documentation for the **docs — refactor** module. Let me analyze what's provided:\n\n1. **CLI Refactor Plan** (`cli.md`) - A detailed plan for refactoring the CodexBar CLI with specific goals around:\n   - JSON-only error handling\n   - Per-provider errors\n   - Config validation\n   - SettingsStore split into smaller files\n\n2. **Macro Refactor Ideas** (`macros.md`) - Ideas for improving provider macro ergonomics and related refactoring\n\nThe call graph shows no internal calls or execution flows - this is a documentation-only module containing planning documents.\n\nLet me structure the documentation to cover:\n1. Module Overview - What this module is\n2. The Two Planning Documents - detailed coverage of each\n3. How they relate to the broader codebase\n4. Implementation roadmap (since there's a step-by-step guide)\n\nSince there's no execution flow and this is purely documentation, I'll organize it as:\n- Overview/Purpose\n- CLI Refactor Plan (detailed)\n- Macro Refactor Ideas (detailed)\n- Relationship between the two plans\n- Implementation guidance\n- Possibly a diagram showing how CLI components will be organized after refactor\n\nLet me write this out in a clear, developer-focused way.\n</think>\n\n# CodexBar Refactor Planning Documentation\n\nThis module contains the architectural planning documents for two major refactoring efforts in the CodexBar codebase:\n\n1. **CLI Refactor Plan** — Restructuring error handling, config validation, and SettingsStore\n2. **Macro Refactor Ideas** — Improving provider descriptor ergonomics and pipeline design\n\nThese documents serve as the authoritative reference for contributors implementing these changes.\n\n---\n\n## Overview\n\nThe `docs/refactor/` module contains technical RFCs (Request for Comments) that guide large-scale refactoring work. Unlike implementation code, these documents describe:\n\n- **Goals** — What the refactor should achieve\n- **Constraints** — What existing behavior must be preserved\n- **Implementation steps** — How to execute the plan incrementally\n- **Validation criteria** — How to verify the work is correct\n\nBoth documents assume familiarity with CodexBar's core concepts: providers, fetch strategies, configuration, and the CLI entry point.\n\n---\n\n## CLI Refactor Plan\n\n**File:** `docs/refactor/cli.md`\n\n### Purpose\n\nThe CLI refactor addresses three related issues in the CodexBar command-line interface:\n\n1. **Mixed output streams** — Errors currently may appear on stderr in various formats, making programmatic consumption difficult\n2. **Config validation gaps** — Invalid configuration fields are not caught early, leading to runtime failures\n3. **File size concerns** — `SettingsStore.swift` and `CLIEntry.swift` have grown beyond maintainable limits\n\n### Key Architectural Changes\n\n#### JSON-Only Error Output\n\nAll CLI output when `--json-only` is specified follows a consistent schema:\n\n```json\n{\n  \"provider\": \"cli\",\n  \"source\": \"cli\",\n  \"error\": { \"code\": 1, \"message\": \"...\", \"kind\": \"config\" }\n}\n```\n\n- **`provider`** — Set to `\"cli\"` for global errors, or the provider name for provider-scoped errors\n- **`source`** — Indicates where the error originated (`\"cli\"`, provider name, etc.)\n- **`error`** — Contains `code` (exit code), `message` (human-readable), and `kind` (error category)\n\nThis enables consumers to parse a single JSON stream and handle errors programmatically.\n\n#### Config Validation Rules\n\nThe validator enforces these rules at config-load time:\n\n| Rule | Condition |\n|------|-----------|\n| `source` validity | Must exist in the provider's `fetchPlan.sourceModes` |\n| `apiKey` presence | Only valid for providers supporting `.api` mode |\n| `cookieSource` | Only valid for providers supporting `.web` or `.auto` |\n| `region` | Only for `zai` or `minimax`; must be a known value |\n| `workspaceID` | Only for `opencode` provider |\n| `tokenAccounts` | Only for providers in `TokenAccountSupportCatalog` |\n\n#### SettingsStore Split\n\nThe refactor splits `SettingsStore.swift` into focused extension files:\n\n```\nSettingsStore.swift          # Core class definition\nSettingsStore+Config.swift   # Config-backed computed properties\nSettingsStore+Defaults.swift # Default-value computed properties  \nSettingsStore+ProviderDetection.swift # Provider enable/disable logic\n```\n\nEach file target: under 500 LOC with clear separation of concerns.\n\n### New CLI Commands\n\n| Command | Purpose |\n|---------|---------|\n| `codexbar config validate` | Validates config, exits non-zero on errors |\n| `codexbar config dump` | (Optional) Outputs normalized config JSON |\n\n### Implementation Sequence\n\nThe plan specifies an eight-step sequence to minimize risk:\n\n1. **Add validation types** — Create `CodexBarConfigIssue` and `CodexBarConfigValidator` in `CodexBarCore/Config`\n2. **Hook validation into CLI** — New `config validate` command with `--json-only` flag\n3. **Unify CLI error reporting** — Single exit path through JSON-aware reporter\n4. **Split CLIEntry.swift** — Extract helpers and payload structs into dedicated files\n5. **Split SettingsStore.swift** — Move computed properties to extension files\n6. **Provider toggles cleanup** — Remove unused `ProviderToggleStore`, preserve migration path\n7. **Add tests** — Cover JSON error payloads, config validation, order invariants\n8. **Verification** — Run `swift test`, `swiftformat`, `swiftlint`, and compile scripts\n\n---\n\n## Macro Refactor Ideas\n\n**File:** `docs/refactor/macros.md`\n\n### Purpose\n\nThis document outlines improvements to the provider macro system. It addresses ergonomic issues and architectural concerns that have emerged as the provider system matured.\n\n### Core Ideas\n\n#### 1. Macro Ergonomics\n\nCurrent state: Macros generate boilerplate but provide limited compile-time feedback.\n\nDesired improvements:\n- **Compile-time errors** when macros are attached to wrong targets or missing required implementations (`descriptor`, `init`)\n- **Member macro** to generate `static let descriptor` from `makeDescriptor()`, reducing repetition\n\n#### 2. Descriptor Refactoring\n\nSplit `ProviderDescriptor` into focused types:\n\n```\nProviderDescriptor   # Core identity\nProviderFetchPlan    # Source modes, API requirements\nProviderBranding     # Display name, icon references\nProviderCLI          # CLI-specific configuration\n```\n\nThis reduces circular dependencies and makes the descriptor easier to test in isolation.\n\n#### 3. Fetch Pipeline Improvements\n\nReturn **all attempted strategies** (not just the successful one) for debugging:\n\n```swift\nstruct FetchAttempt {\n    let strategy: FetchStrategy\n    let result: Result<FetchOutput, FetchError>\n}\n\n// In the fetch method:\nreturn FetchResult(\n    successful: FetchAttempt(...),\n    attempts: [FetchAttempt(...), FetchAttempt(...)]  // All tries\n)\n```\n\nEnables `--verbose` CLI output showing fallback behavior.\n\n#### 4. Registry Order Stability\n\nCurrent: Registry sorts providers by `rawValue`, which may change between versions.\n\nProposed:\n- Use **registration order** for `all` provider list\n- Add metadata flags (`isPrimaryProvider`) instead of hard-coding provider names\n- Deterministic ordering enables stable snapshot tests\n\n#### 5. Account/Identity Handling\n\nReplace special-case logic in Codex UI with a descriptor flag:\n\n```swift\n// Instead of:\nif provider == .codex { /* handle account fallback */ }\n\n// Use:\nstruct ProviderDescriptor {\n    let usesAccountFallback: Bool\n}\n```\n\n#### 6. Settings + Token Resolution\n\nMove token lookup into strategy-local resolvers:\n\n```\nZaiTokenResolver   # Keychain → environment → failure\nCopilotTokenResolver  # Keychain → environment → failure\n```\n\nAdd optional per-provider settings to `ProviderSettingsSnapshot`.\n\n### Follow-up Tasks\n\n- Add a **minimal provider example** in `docs/provider.md`\n- Add **registry completeness test** — all required providers present\n- Add **deterministic-order test** — registry order stable across builds\n\n---\n\n## Relationship Between Plans\n\nThe two planning documents share several connection points:\n\n| CLI Refactor | Macro Refactor | Connection |\n|--------------|----------------|------------|\n| Config validation | Descriptor splitting | Validation rules reference `fetchPlan.sourceModes`; descriptor split makes this cleaner |\n| Provider errors | Registry order | Provider-scoped errors depend on stable provider ordering |\n| SettingsStore | Token resolution | Macro plan moves token lookup to strategy layer; CLI plan cleans up settings |\n\nBoth plans also converge on testing:\n- CLI refactor adds config validation tests\n- Macro refactor calls out registry completeness tests\n\n---\n\n## Reading These Documents\n\n**When to read `cli.md`:**\n- Implementing the `config validate` command\n- Splitting `SettingsStore.swift` or `CLIEntry.swift`\n- Adding new config validation rules\n- Working on JSON error output\n\n**When to read `macros.md`:**\n- Creating a new provider\n- Refactoring provider descriptors\n- Adding new fetch strategies\n- Improving error reporting in the fetch pipeline\n\n---\n\n## Verification Checklist\n\nAfter implementing changes per these plans, verify:\n\n- [ ] `swift test` passes\n- [ ] `swiftformat Sources Tests` passes\n- [ ] `swiftlint --strict` passes  \n- [ ] `./Scripts/compile_and_run.sh` succeeds\n- [ ] CLI e2e: `codexbar --json-only ...` outputs valid JSON\n- [ ] CLI e2e: `codexbar config validate` catches invalid config\n\n---\n\n## File Reference\n\n| File | Purpose |\n|------|---------|\n| `docs/refactor/cli.md` | CLI error handling, config validation, SettingsStore split |\n| `docs/refactor/macros.md` | Provider macro ergonomics, descriptor design, pipeline improvements |","docs":"# docs\n\n<think>\nThe user wants me to write documentation for the **docs — refactor** module. Let me analyze what's provided:\n\n1. **CLI Refactor Plan** (`cli.md`) - A detailed plan for refactoring the CodexBar CLI with specific goals around:\n   - JSON-only error handling\n   - Per-provider errors\n   - Config validation\n   - SettingsStore split into smaller files\n\n2. **Macro Refactor Ideas** (`macros.md`) - Ideas for improving provider macro ergonomics and related refactoring\n\nThe call graph shows no internal calls or execution flows - this is a documentation-only module containing planning documents.\n\nLet me structure the documentation to cover:\n1. Module Overview - What this module is\n2. The Two Planning Documents - detailed coverage of each\n3. How they relate to each other and to the broader codebase\n\nKey points to include:\n- The CLI refactor is a concrete, multi-step plan for improving error handling and configuration\n- The Macro refactor is more exploratory, looking at ergonomic improvements for the provider macros\n- They are related but serve different purposes: one is actionable plan, the other is brainstorming\n\nI should include a Mermaid diagram since it would help clarify the relationship between these planning documents and the eventual code changes.\n\nLet me write concise but comprehensive documentation that:\n- Explains what this module is (refactoring planning docs)\n- Details each sub-document\n- Shows how they relate to each other\n- Links to the child pages for more detail\n</think>\n\n# Refactor Planning Documentation\n\nThis module contains planning documents that outline proposed refactoring work for the CodexBar codebase. These are not active code modules — they document intended improvements to the application's architecture and developer experience.\n\n## Overview\n\nThe **refactor** documentation module contains two related planning documents that address distinct but interconnected areas of improvement:\n\n- **[CLI Refactor Plan](cli.md)** — A concrete, multi-step refactoring plan focused on improving error handling, configuration validation, and code organization in the command-line interface.\n- **[Macro Refactor Ideas](macros.md)** — Exploratory documentation examining potential ergonomic improvements to the provider macro system.\n\nBoth documents target the same codebase but address different layers: the CLI refactor focuses on integration concerns (errors, config, settings), while the macro refactor examines the provider abstraction layer itself.\n\n## How They Relate\n\nThe CLI refactor is an actionable plan with defined steps, while the macro refactor documents brainstorming that may inform future CLI improvements. The SettingsStore split mentioned in the CLI plan has overlap with macro-related refactoring, as provider configuration lives at the intersection of both concerns.\n\n```mermaid\nflowchart TD\n    CLI[CLI Refactor Plan<br>cli.md] --> |Improves| Config[Config Validation]\n    CLI --> |Improves| Errors[Error Handling]\n    CLI --> |Restructures| Settings[SettingsStore Split]\n    \n    Macros[Macro Refactor Ideas<br>macros.md] --> |Informs| Future[Future CLI Improvements]\n    Macros --> |Explores| ProviderErgonomics[Provider Macros]\n    \n    Settings -.-> |May affect| ProviderErgonomics\n    \n    style CLI fill:#e1f5fe\n    style Macros fill:#fce4ec\n```\n\n## Documents\n\n| Document | Purpose | Status |\n|----------|---------|--------|\n| [CLI Refactor Plan](cli.md) | Structured plan for CLI improvements | Defined steps |\n| [Macro Refactor Ideas](macros.md) | Exploratory notes on macro ergonomics | Brainstorming |\n\nThe CLI refactor plan contains specific, implementable steps. The macro ideas document is exploratory — its suggestions may be adopted, modified, or deferred based on priorities.","icon-icon":"# Icon.icon\n\n<think>\nLet me analyze this module. Based on the provided information, I need to understand what this module does and document it appropriately.\n\nLooking at the icon.json file, this appears to be a configuration file for an icon in a UI system. Let me break down the components:\n\n1. **fill** - Contains an automatic gradient with extended-sRGB color values\n2. **groups** - Contains layer information (an image called \"codexbar.png\")\n3. **supported-platforms** - Specifies which platforms support this icon (watchOS for circles, shared for squares)\n\nThe module is called \"Icon.icon\" and it seems to be a configuration/specification for an icon rather than executable code. The call graph shows no internal or external calls, and no execution flows detected.\n\nThis is essentially a JSON configuration that defines:\n- The visual appearance of an icon (gradient fill)\n- The image layers that make up the icon\n- Shadow and translucency effects\n- Platform compatibility\n\nLet me write comprehensive documentation for this module, treating it as the configuration specification it is.\n</think>\n\n# Icon.icon Module Documentation\n\n## Overview\n\nThe **Icon.icon** module defines the visual specification, rendering behavior, and platform compatibility for a single icon asset in the application. This module is a JSON-based configuration that describes how an icon should appear and where it can be used.\n\n## Purpose\n\nThis module serves as a declarative definition for icon rendering across the application's UI layer. It controls:\n\n- **Visual appearance** — Fill colors and gradients\n- **Layer composition** — Image assets that compose the icon\n- **Visual effects** — Shadows and translucency\n- **Platform targeting** — Where the icon can be displayed\n\n## Configuration Structure\n\n```json\n{\n  \"fill\": { ... },\n  \"groups\": [ ... ],\n  \"supported-platforms\": { ... }\n}\n```\n\n---\n\n## Key Components\n\n### 1. Fill (Color Specification)\n\n```json\n\"fill\": {\n  \"automatic-gradient\": \"extended-srgb:0.00000,0.53333,1.00000,1.00000\"\n}\n```\n\nThe `fill` property defines the icon's primary color as an automatic gradient using the **extended-sRGB** color space.\n\n| Value | Component | Interpretation |\n|-------|-----------|----------------|\n| `0.00000` | R | Red channel (0%) |\n| `0.53333` | G | Green channel (~53%) |\n| `1.00000` | B | Blue channel (100%) |\n| `1.00000` | A | Alpha/opacity (fully opaque) |\n\nThis produces a **blue** gradient with no red, moderate green, and full blue — resulting in a vivid cyan-to-blue appearance.\n\n> **Note:** The \"automatic-gradient\" designation suggests the rendering system dynamically adjusts the gradient based on context (e.g., light/dark mode, user preferences) while using these values as the baseline.\n\n---\n\n### 2. Groups (Layer Composition)\n\n```json\n\"groups\": [\n  {\n    \"layers\": [\n      {\n        \"image-name\": \"codexbar.png\",\n        \"name\": \"codexbar\",\n        \"position\": {\n          \"scale\": 1.4,\n          \"translation-in-points\": [0, 0]\n        }\n      }\n    ],\n    \"shadow\": {\n      \"kind\": \"neutral\",\n      \"opacity\": 0.5\n    },\n    \"translucency\": {\n      \"enabled\": true,\n      \"value\": 0.5\n    }\n  }\n]\n```\n\nThe `groups` array contains one or more render groups, each with:\n\n#### Layers\n\n| Property | Value | Description |\n|----------|-------|-------------|\n| `image-name` | `\"codexbar.png\"` | The source image asset |\n| `name` | `\"codexbar\"` | Internal identifier for the layer |\n| `position.scale` | `1.4` | Scale factor (140% of base size) |\n| `position.translation-in-points` | `[0, 0]` | No offset from origin |\n\n#### Shadow Configuration\n\n```json\n\"shadow\": {\n  \"kind\": \"neutral\",\n  \"opacity\": 0.5\n}\n```\n\n- **kind**: `\"neutral\"` — Uses a neutral gray shadow color that adapts to context\n- **opacity**: `0.5` — 50% opacity, creating a moderate shadow\n\n#### Translucency\n\n```json\n\"translucency\": {\n  \"enabled\": true,\n  \"value\": 0.5\n}\n```\n\n- **enabled**: `true` — Translucency effect is active\n- **value**: `0.5` — 50% translucency, allowing partial visibility of content behind the icon\n\n---\n\n### 3. Supported Platforms\n\n```json\n\"supported-platforms\": {\n  \"circles\": [\"watchOS\"],\n  \"squares\": \"shared\"\n}\n```\n\nThe `supported-platforms` property defines where this icon can be rendered based on shape context:\n\n| Shape | Platform Support | Meaning |\n|-------|-----------------|---------|\n| `circles` | `[\"watchOS\"]` | Only usable in circular icon contexts on watchOS |\n| `squares` | `\"shared\"` | Available across all platforms in square/icon-square contexts |\n\n> **Implication:** This icon is specifically optimized for Apple Watch interfaces (circular) while maintaining broader availability for standard square icon slots.\n\n---\n\n## Rendering Pipeline\n\nSince this module contains no executable code, the actual rendering happens in a separate icon rendering system that consumes this configuration. Based on the structure, the expected pipeline is:\n\n```mermaid\nflowchart LR\n    A[JSON Config<br/>Icon.icon] --> B[Config Parser]\n    B --> C[Asset Loader<br/>codexbar.png]\n    C --> D[Layer Compositor]\n    D --> E[Effect Processor<br/>Shadow + Translucency]\n    E --> F[Gradient Applicator<br/>extended-sRGB]\n    F --> G[Platform Filter<br/>watchOS / shared]\n    G --> H[Final Icon<br/>Rendered]\n```\n\n---\n\n## Usage Notes\n\n1. **Asset dependency**: This icon requires `codexbar.png` to be present in the application's asset catalog. If the asset is missing, rendering will fail or fall back to a placeholder.\n\n2. **Scale impact**: The `1.4` scale factor means this icon renders 40% larger than the base icon size. Ensure the source image has sufficient resolution to avoid pixelation at larger sizes.\n\n3. **Effect performance**: Enabling both shadow (`opacity: 0.5`) and translucency (`value: 0.5`) may impact rendering performance on resource-constrained devices like Apple Watch. Test on actual hardware.\n\n4. **Platform-specific behavior**: The `\"watchOS\"` restriction for circles suggests this icon may be part of a watch face or complication. The `\"shared\"` designation for squares indicates it's also used in the main iOS/iPadOS app.\n\n---\n\n## Related Modules\n\nThis module likely connects to:\n\n- **Icon Rendering System** — Consumes this configuration to produce rendered icons\n- **Asset Catalog** — Stores the `codexbar.png` resource\n- **Platform Selection Logic** — Determines which icon configuration to use based on device and context\n\n---\n\n## File Reference\n\n| File | Purpose |\n|------|---------|\n| `Icon.icon/icon.json` | This configuration file |\n| `codexbar.png` | Source image asset (external dependency) |","overview":"# CodexBar — Wiki\n\n<think>\nThe user wants me to write the top-level overview page for the CodexBar repository wiki. Let me analyze what's been provided:\n\n1. **Project Info**: CodexBar is a macOS 14+ menu bar app that displays API usage/token limits for various AI providers (Claude, Cursor, Codex, etc.)\n\n2. **Module Summaries**: There are several modules:\n   - Root (config files)\n   - Icon.icon (app icon)\n   - Scripts (build/deploy scripts)\n   - Sources (main code: CodexBar app, CLI, watchdog, web probe, core)\n   - Tests (macOS tests)\n   - TestsLinux (Linux tests)\n   - docs (planning docs)\n\n3. **Key Requirements**:\n   - Be clear and welcoming\n   - Reference actual module names so readers can navigate\n   - Include Mermaid diagram (max 10 nodes)\n   - No module index tables\n   - Link to module pages naturally in text\n\nLet me write a good overview that:\n1. Introduces what CodexBar is\n2. Shows the architecture with a Mermaid diagram\n3. Explains key flows\n4. Links to relevant modules naturally\n5. Includes setup instructions\n\nThe diagram should show the main components:\n- CodexBar (main app)\n- CodexBarCLI (CLI)\n- CodexBarCore (shared)\n- Sources (fetchers, parsers, probes)\n- Icon\n- Scripts\n- Tests\n\nLet me write this out:\n</think>\n\n# CodexBar 🎚️\n\nWelcome to the CodexBar codebase. This repository contains a tiny macOS 14+ menu bar application that keeps your AI provider usage limits visible — tracking session and weekly quotas for Claude, Cursor, Codex, Gemini, and many others. It lives entirely in your menu bar with no Dock icon.\n\n## What It Does\n\nCodexBar displays a status item per provider in your menu bar, showing current token usage and when each quota window resets. You can enable only the providers you use via Settings, or use \"Merge Icons\" mode with a provider switcher and optional Overview tab. The app monitors AI services like Claude.ai, Cursor, GitHub Copilot, Google Gemini, and others — pulling usage data from both web APIs and local CLI processes.\n\nThere's also a **Linux CLI** variant for headless environments, driven by the [Omarchy](https://omarchy.com) community project with Waybar module and TUI support.\n\n## Architecture Overview\n\nThe codebase is organized into several key areas:\n\n```\n┌─────────────────────────────────────────────────────────────┐\n│                      CodexBar                               │\n│                  (macOS Menu Bar App)                       │\n└──────────────────────────┬──────────────────────────────────┘\n                           │\n        ┌──────────────────┼──────────────────┐\n        ▼                  ▼                  ▼\n┌───────────────┐  ┌───────────────┐  ┌───────────────┐\n│ UsageFetchers │  │ StatusProbes  │  │  UI Components│\n│ (API clients) │  │ (web checks)  │  │ (menu, icons) │\n└───────────────┘  └───────────────┘  └───────────────┘\n        │                  │\n        ▼                  ▼\n┌─────────────────────────────────────────────────────────────┐\n│                    CodexBarCore                              │\n│         (Shared: config, cookies, keychain, prefs)          │\n└─────────────────────────────────────────────────────────────┘\n```\n\n- **[Sources](Sources.md)** — The main application code including the menu bar app, CLI, and shared core utilities. This is where you'll find the [fetchers](Sources.md#codexbar-sources-usagefetchers) that query each provider's API, the [probes](Sources.md#codexbar-sources-statusprobes) that check account status, and the [UI layer](Sources.md#codexbar-sources-app) that renders the menu bar interface.\n- **[Scripts](Scripts.md)** — Build, release, and deployment automation. These handle packaging the app, generating icons, and publishing releases.\n- **[Tests](Tests.md)** and **[TestsLinux](TestsLinux.md)** — Platform-specific test suites ensuring correctness across macOS and Linux.\n\n## Key End-to-End Flows\n\n### Menu Bar Display Flow\n\n1. On launch, the [AppDelegate](Sources.md#codexbar-sources-app) initializes the menu bar status2. Each item\n enabled provider starts a [UsageFetcher](Sources.md#codexbar-sources-usagefetchers) that runs on a timer\n3. Fetchers query their respective APIs (some via browser cookies, some via CLI wrappers) to get current quota info\n4. The results flow into the [StatusItemController](Sources.md#codexbar-sources-statusitemcontroller) which updates the menu bar icon and text\n5. [StatusProbes](Sources.md#codexbar-sources-statusprobes) periodically check if the user is logged in or if there are service issues\n\n### CLI Query Flow\n\n1. The [CodexBarCLI](Sources.md#codexbar-sources-codexbarcli) accepts command-line arguments specifying a provider\n2. It loads configuration from [SettingsStore](Sources.md#codexbar-sources-settingsstore) to get stored credentials\n3. Uses the same [UsageFetcher](Sources.md#codexbar-sources-usagefetchers) infrastructure to fetch quota data\n4. Outputs JSON to stdout for consumption by external tools like Waybar\n\n## Getting Started\n\n### Requirements\n\n- **macOS 14+ (Sonoma)** for the full menu bar app\n- **macOS 13+** for CLI-only usage\n- **Linux** for CLI with Omarchy integration\n\n### Setup\n\n```bash\n# Install dependencies\nbrew install swiftlint swift-format\n\n# Run the app in development\nmake start\n\n# Run tests\nmake test        # macOS UI tests\nmake test:live   # interactive test mode\n\n# Build for release\nmake build\n```\n\nFor release deployment, see the [Scripts](Scripts.md) module which handles code signing, notarization, and publishing to GitHub Releases and Homebrew.\n\n### Development Notes\n\n- The app uses **no external dependencies** beyond Apple's frameworks — SwiftUI for UI, Foundation for networking\n- Provider credentials are stored in the **Keychain** (see [Keychain](Sources.md#codexbar-sources-keychain))\n- Browser cookies for web API access are managed through [BrowserCookieReader](Sources.md#codexbar-sources-browsercookiereader)\n- Configuration lives in [SettingsStore](Sources.md#codexbar-sources-settingsstore) and persists via `UserDefaults`\n\n## Project Structure\n\n| Path | Purpose |\n|------|---------|\n| `Sources/CodexBar/` | Main macOS menu bar application |\n| `Sources/CodexBarCLI/` | Command-line interface for Linux/macOS |\n| `Sources/CodexBarCore/` | Shared utilities (config, keychain, cookies) |\n| `Sources/CodexBarClaudeWatchdog/` | Process supervisor for Claude CLI |\n| `Sources/CodexBarClaudeWebProbe/` | Network probe for Claude.ai endpoints |\n| `Scripts/` | Build and release automation |\n| `Tests/` | macOS test suite |\n| `TestsLinux/` | Linux-compatible tests |\n\n## Contributing\n\nSee [AGENTS.md](https://github.com/steipete/CodexBar/blob/main/AGENTS.md) for repository guidelines. The project follows standard Swift conventions and uses SwiftLint for style enforcement. When adding a new provider:\n\n1. Create a new `*UsageFetcher` in [Sources](Sources.md)\n2. Add it to the provider registry\n3. Add Settings UI for enabling/disabling\n4. Write tests in [Tests](Tests.md)","root":"# Root\n\n<think>\nThe user is asking me to write documentation for the \"Root\" module. Let me analyze what this module contains based on the provided source code files.\n\nLooking at the files provided:\n- `AGENTS.md` - Repository guidelines\n- `FORK_STATUS.md` - Fork status tracking\n- `IMPLEMENTATION_SUMMARY.md` - Implementation summary\n- `Package.swift` - Swift package configuration\n- `README.md` - Main documentation\n- `appcast.xml` - Sparkle update feed\n- `package.json` - npm scripts\n- `version.env` - Version info\n\nThese are all root-level configuration files for the CodexBar project. The \"Root\" module here seems to refer to the top-level project configuration and documentation files.\n\nLooking at the Package.swift, this is a Swift package that builds:\n- CodexBarCore - Core library\n- CodexBarMacroSupport - Macro support\n- CodexBarCLI - Command line interface\n- CodexBar - macOS menu bar app\n- CodexBarWidget - Widget extension\n- CodexBarClaudeWatchdog - Claude watchdog\n- CodexBarClaudeWebProbe - Claude web probe\n- Various test targets\n\nThe \"Root\" module documentation should cover:\n1. Project overview and what CodexBar is\n2. Package structure and targets\n3. Dependencies\n4. Build configuration\n5. Version management\n6. How this connects to the rest of the codebase\n\nLet me write comprehensive documentation for this root module.\n</think>\n\n# Root Module Documentation\n\nThe **Root** module represents the top-level configuration and documentation layer for CodexBar — a macOS menu bar application that monitors AI provider usage limits. This module contains the Swift Package Manager configuration, project metadata, build scripts, and core documentation files that tie the entire codebase together.\n\n## Overview\n\nCodexBar is a lightweight macOS 14+ menu bar utility that displays usage quotas for multiple AI providers (Codex, Claude, Cursor, Gemini, and many others) directly in the menu bar. It tracks session and weekly limits, shows reset countdowns, and provides a unified interface for monitoring AI credits across providers.\n\nThe Root module serves as the project's entry point, defining:\n\n- **Package structure** — All Swift targets and their dependencies\n- **Build configuration** — Platforms, compilation settings, resources\n- **Version management** — Marketing version and build numbers\n- **Project metadata** — README, changelog, release automation\n\n## Package Structure\n\nThe `Package.swift` defines a multi-target Swift package with platform-specific components:\n\n```mermaid\ngraph TB\n    subgraph Targets\n        CB[\"CodexBar<br/>macOS App\"]\n        CBC[\"CodexBarCore<br/>Core Library\"]\n        CBM[\"CodexBarMacroSupport<br/>Macro Support\"]\n        CLI[\"CodexBarCLI<br/>CLI Tool\"]\n        W[\"CodexBarWidget<br/>Widget\"]\n        WD[\"CodexBarClaudeWatchdog<br/>Watchdog\"]\n        WP[\"CodexBarClaudeWebProbe<br/>Web Probe\"]\n    end\n    \n    subgraph Tests\n        CBT[\"CodexBarTests\"]\n        CL[\"CodexBarLinuxTests\"]\n    end\n    \n    CB --> CBC\n    CB --> CBM\n    CLI --> CBC\n    W --> CBC\n    WD --> WD\n    WP --> CBC\n    CBT --> CB\n    CBT --> CBC\n    CL --> CBC\n    CL --> CLI\n```\n\n### Core Targets\n\n| Target | Platform | Purpose |\n|--------|----------|---------|\n| `CodexBar` | macOS | Main menu bar application |\n| `CodexBarCore` | All | Shared logic for provider integration, status probing, usage parsing |\n| `CodexBarMacroSupport` | All | Swift macro definitions for compile-time code generation |\n| `CodexBarCLI` | All | Command-line interface for scripts and CI |\n| `CodexBarWidget` | macOS | WidgetKit extension mirroring menu bar state |\n| `CodexBarClaudeWatchdog` | macOS | Background process monitoring Claude availability |\n| `CodexBarClaudeWebProbe` | macOS | Web-based usage probing for Claude |\n\n### Test Targets\n\n| Target | Platform | Purpose |\n|--------|----------|---------|\n| `CodexBarTests` | macOS | Full XCTest suite for all macOS functionality |\n| `CodexBarLinuxTests` | Linux | Cross-platform CLI tests |\n\n## Dependencies\n\nThe package declares five external dependencies:\n\n```swift\n// Package.swift dependencies\ndependencies: [\n    .package(url: \"https://github.com/sparkle-project/Sparkle\", from: \"2.6.0\"),\n    .package(url: \"https://github.com/steipete/Commander\", from: \"0.2.1\"),\n    .package(url: \"https://github.com/apple/swift-log\", from: \"1.5.0\"),\n    .package(url: \"https://github.com/sindresorhus/KeyboardShortcuts\", from: \"1.16.0\"),\n    .package(path: \"../SweetCookieKit\"),  // Local dependency\n]\n```\n\n### Dependency Roles\n\n- **Sparkle** — Auto-update framework for macOS app updates via `appcast.xml`\n- **Commander** — CLI argument parsing for `CodexBarCLI`\n- **swift-log** — Structured logging throughout all targets\n- **KeyboardShortcuts** — Global keyboard shortcut support in the menu bar app\n- **SweetCookieKit** — Browser cookie extraction (Chrome, Firefox, Safari, etc.)\n\n## Build Configuration\n\n### Platform Requirements\n\n```swift\nplatforms: [\n    .macOS(.v13),  // Minimum: macOS 13 (Ventura)\n]\n```\n\n> **Note:** While the package declares macOS 13 as minimum, some features (like certain menu bar animations) require macOS 14+ or macOS 15+. See `README.md` for full requirements.\n\n### Conditional Compilation\n\nThe package uses `#if os(macOS)` to include macOS-only targets:\n\n```swift\n#if os(macOS)\n    targets.append(contentsOf: [\n        .executableTarget(name: \"CodexBar\", ...),\n        .executableTarget(name: \"CodexBarWidget\", ...),\n        // ... other macOS targets\n    ])\n    targets.append(.testTarget(name: \"CodexBarTests\", ...))\n#endif\n```\n\nThis allows Linux builds to compile and test the CLI and core library without GUI dependencies.\n\n### Resource Handling\n\nThe main `CodexBar` target includes resources:\n\n```swift\nresources: [\n    .process(\"Resources\"),\n]\n```\n\nThese include app icons, menu bar assets, and any bundled configuration files.\n\n### Swift Settings\n\nThe main app target defines compile-time flags:\n\n```swift\nswiftSettings: [\n    .define(\"ENABLE_SPARKLE\"),\n]\n```\n\nThis enables Sparkle update checking in the app while keeping the core library platform-agnostic.\n\n## Version Management\n\nVersion information lives in two places:\n\n### `version.env`\n\n```\nMARKETING_VERSION=0.18.0-beta.3\nBUILD_NUMBER=51\n```\n\n- **MARKETING_VERSION** — User-facing version string (semver)\n- **BUILD_NUMBER** — Continuous integration build identifier\n\n### `appcast.xml`\n\nThe Sparkle update feed (`appcast.xml`) lists all releases with:\n\n- Version strings and build numbers\n- Release notes (changelog)\n- Download URLs\n- Code signatures for secure updates\n\n```xml\n<item sparkle:channel=\"beta\">\n    <title>0.18.0-beta.3</title>\n    <sparkle:version>51</sparkle:version>\n    <sparkle:shortVersionString>0.18.0-beta.3</sparkle:shortVersionString>\n    <enclosure url=\"...\" sparkle:edSignature=\"...\"/>\n</item>\n```\n\n## Build and Run\n\n### Quick Start\n\n```bash\n# Development build\nswift build\n\n# Release build\nswift build -c release\n\n# Run tests\nswift test\n\n# Package the macOS app\n./Scripts/package_app.sh\n```\n\n### Development Loop\n\nThe project includes a convenience script for rapid iteration:\n\n```bash\n./Scripts/compile_and_run.sh\n```\n\nThis script:\n1. Kills any running CodexBar instance\n2. Runs `swift build` and `swift test`\n3. Packages the app bundle\n4. Launches the new build\n5. Confirms the app stays running\n\n### Package Scripts\n\n| Script | Purpose |\n|--------|---------|\n| `Scripts/package_app.sh` | Build `CodexBar.app` bundle |\n| `Scripts/compile_and_run.sh` | Full dev loop (build → test → package → launch) |\n| `Scripts/sign-and-notarize.sh` | Notarize for distribution (arm64) |\n| `Scripts/make_appcast.sh` | Generate update feed |\n| `Scripts/build_icon.sh` | Render app icon variants |\n| `Scripts/lint.sh` | Run SwiftFormat and SwiftLint |\n\n## Project Metadata\n\n### `package.json` — npm Scripts\n\nThe project uses pnpm/npm for script orchestration:\n\n```json\n{\n  \"scripts\": {\n    \"start\": \"./Scripts/compile_and_run.sh\",\n    \"build\": \"swift build\",\n    \"test\": \"swift test\",\n    \"release\": \"./Scripts/package_app.sh release\",\n    \"lint\": \"./Scripts/lint.sh lint\",\n    \"format\": \"./Scripts/lint.sh format\"\n  }\n}\n```\n\nThis allows developers to use familiar commands (`pnpm start`, `pnpm test`) regardless of the underlying shell scripts.\n\n### Documentation Structure\n\n```\ndocs/\n├── providers.md      # Provider overview\n├── provider.md       # Authoring guide for new providers\n├── architecture.md   # System architecture\n├── refresh-loop.md   # Usage refresh timing\n├── status.md        # Status polling\n├── ui.md            # Menu bar UI\n├── cli.md           # CLI reference\n├── sparkle.md       # Auto-update\n├── RELEASING.md     # Release checklist\n└── [provider].md   # Individual provider docs (claude.md, cursor.md, etc.)\n```\n\n## Relationship to Other Modules\n\nThe Root module orchestrates the entire codebase. While it doesn't contain runtime logic, it defines how all other modules connect:\n\n```mermaid\nflowchart LR\n    Root[Root Module<br/>Package.swift] --> Core[CodexBarCore]\n    Root --> App[CodexBar]\n    Root --> CLI[CodexBarCLI]\n    Root --> Widget[CodexBarWidget]\n    \n    Core --> Providers[Provider Implementations]\n    Core --> Probes[Status Probes]\n    Core --> Parsers[Usage Parsers]\n    \n    App --> Core\n    App --> Sparkle\n    App --> KeyboardShortcuts\n    \n    CLI --> Core\n    CLI --> Commander\n    \n    Widget --> Core\n    \n    Providers -.-> SweetCookieKit[Cookie Import]\n```\n\n### Key Integrations\n\n1. **CodexBarCore** — The shared engine that all other targets depend on. Contains provider protocols, status probing infrastructure, and usage parsing.\n\n2. **CodexBar (macOS app)** — The primary consumer of Core, adding:\n   - Menu bar UI (`NSStatusItem`)\n   - Preferences window\n   - Sparkle integration\n   - Keyboard shortcuts\n\n3. **CodexBarCLI** — Headless consumer of Core for:\n   - Scriptable usage queries\n   - CI/CD integration\n   - Linux support\n\n4. **CodexBarWidget** — Mirrors app state via WidgetKit for macOS Notification Center\n\n## Fork Considerations\n\nThis codebase is maintained as a fork with additional provider support (notably Augment). The Root configuration supports:\n\n- **Multi-upstream monitoring** — Scripts track both original (`steipete/CodexBar`) and fork-specific changes\n- **Selective sync** — Cherry-pick upstream commits without merging provider removals\n- **Dual attribution** — About pane credits both original author and fork maintainer\n\nSee `FORK_STATUS.md` and `docs/UPSTREAM_STRATEGY.md` for fork-specific workflows.\n\n## Quick Reference\n\n| Item | Value |\n|------|-------|\n| Package Name | `CodexBar` |\n| Minimum macOS | 13 (Ventura) |\n| Recommended macOS | 14+ (Sonoma) |\n| Swift Version | 5.7+ |\n| Package Manager | SwiftPM |\n| License | MIT |\n| Main Author | Peter Steinberger (@steipete) |\n\n---\n\nThe Root module is intentionally lightweight — it defines *what* gets built rather than *how* it works. For implementation details, see:\n\n- **Architecture**: `docs/architecture.md`\n- **Provider system**: `docs/providers.md`\n- **Core module**: `Sources/CodexBarCore/` documentation","scripts":"# Scripts\n\n<think>\nThe user wants me to write documentation for the Scripts module. Let me analyze what I've been given:\n\n1. **Source Code**: 21 shell scripts in the Scripts directory:\n   - analyze_quotio.sh - Analyzes the quotio fork for patterns\n   - build_icon.sh - Generates macOS app icons\n   - changelog-to-html.sh - Converts changelog sections to HTML\n   - check-release-assets.sh - Verifies release artifacts\n   - check_upstreams.sh - Checks for upstream changes\n   - compile_and_run.sh - Full build pipeline (kill, build, package, launch)\n   - docs-list.mjs - Lists markdown docs with metadata\n   - install_lint_tools.sh - Downloads SwiftFormat and SwiftLint\n   - launch.sh - Simple app launcher\n   - lint.sh - Runs linting/formatting\n   - make_appcast.sh - Creates Sparkle appcast\n   - package_app.sh - Builds and bundles the app\n   - prepare_upstream_pr.sh - Creates branches for upstream PRs\n   - release.sh - Full release pipeline\n   - review_upstream.sh - Creates review branches for upstream changes\n   - setup_dev_signing.sh - Creates dev certificates\n   - sign-and-notarize.sh - Code signs and notarizes for release\n   - test_live_update.sh - Tests Sparkle updates\n   - validate_changelog.sh - Validates CHANGELOG.md format\n   - verify_appcast.sh - Verifies appcast signatures\n\n2. **Call Graph & Execution Flows**: None detected - these are standalone scripts\n\nThis is a collection of utility scripts for the CodexBar project. They fall into several categories:\n- **Build & Release**: compile_and_run.sh, package_app.sh, release.sh, sign-and-notarize.sh\n- **Upstream Sync**: check_upstreams.sh, review_upstream.sh, prepare_upstream_pr.sh, analyze_quotio.sh\n\n\n- **Development Tools**: launch.sh, lint.sh, install_lint_tools.sh, setup_dev_signing.sh, docs-list.mjs\n- **Release Automation**: changelog-to-html.sh, validate_changelog.sh, make_appcast.sh, verify_appcast.sh, check-release-assets.sh, test_live_update.sh\n- **Icon Generation**: build_icon.sh\n\nThe scripts operate as standalone utilities without calling each other directly, though they reference external files and tools. I should structure the documentation to reflect these functional categories and how they support the overall development and release workflow.\n</think>\n\n# Scripts Module\n\nThe **Scripts** module contains 21 shell and Node.js scripts that power CodexBar's development workflow, build pipeline, and release automation. These are standalone utilities—no internal function calls exist between them—but they work together as part of a cohesive CI/CD and developer experience system.\n\n---\n\n## Overview\n\nCodexBar uses a script-driven approach to automation rather than a traditional Makefile or complex build system. Each script has a specific, focused purpose:\n\n```mermaid\nflowchart TB\n    subgraph \"Developer Workflow\"\n        A[launch.sh] --> B[compile_and_run.sh]\n        B --> C[lint.sh]\n        C --> D[install_lint_tools.sh]\n    end\n\n    subgraph \"Build & Package\"\n        E[package_app.sh] --> F[CodexBar.app]\n        E --> G[sign-and-notarize.sh]\n    end\n\n    subgraph \"Release\"\n        G --> H[release.sh]\n        H --> I[make_appcast.sh]\n        H --> J[validate_changelog.sh]\n        H --> K[changelog-to-html.sh]\n    end\n\n    subgraph \"Upstream Integration\"\n        L[check_upstreams.sh]\n        M[review_upstream.sh]\n        N[prepare_upstream_pr.sh]\n        O[analyze_quotio.sh]\n    end\n\n    subgraph \"Utilities\"\n        P[build_icon.sh]\n        Q[docs-list.mjs]\n        R[verify_appcast.sh]\n        S[test_live_update.sh]\n        T[setup_dev_signing.sh]\n    end\n```\n\n---\n\n## Script Categories\n\n### Build & Development\n\n| Script | Purpose |\n|--------|---------|\n| `compile_and_run.sh` | Full development cycle: kills existing instances, builds, packages, launches, and verifies the app runs |\n| `package_app.sh` | Builds Swift binaries and assembles the `.app` bundle with frameworks, resources, and entitlements |\n| `launch.sh` | Simple launcher that kills existing instances and opens the app |\n| `lint.sh` | Runs SwiftFormat and SwiftLint; supports `lint` and `format` subcommands |\n| `install_lint_tools.sh` | Downloads pinned versions of SwiftFormat (0.59.1) and SwiftLint (0.63.2) to `.build/lint-tools` |\n| `setup_dev_signing.sh` | Creates a self-signed certificate to reduce keychain prompts during development |\n\n### Release Pipeline\n\n| Script | Purpose |\n|--------|---------|\n| `release.sh` | Orchestrates the full release: lint → test → sign → notarize → tag → create GitHub release → update appcast |\n| `sign-and-notarize.sh` | Code signs with Developer ID, submits to Apple's notary service, staples the ticket |\n| `make_appcast.sh` | Generates Sparkle appcast.xml with Ed25519 signatures |\n| `validate_changelog.sh` | Ensures CHANGELOG.md has a proper version section at the top |\n| `changelog-to-html.sh` | Extracts a version's changelog entries and converts Markdown to HTML for Sparkle release notes |\n| `verify_appcast.sh` | Validates an appcast entry's Ed25519 signature and enclosure length |\n| `check-release-assets.sh` | Verifies release artifacts exist for a given tag |\n| `test_live_update.sh` | Downloads a previous release, installs it, and manually verifies Sparkle update flow |\n\n### Upstream Synchronization\n\n| Script | Purpose |\n|--------|---------|\n| `check_upstreams.sh` | Fetches and displays recent commits from upstream (steipete/CodexBar) and quotio fork |\n| `review_upstream.sh` | Creates a review branch from upstream changes for inspection |\n| `prepare_upstream_pr.sh` | Creates a clean branch for submitting PRs back to upstream |\n| `analyze_quotio.sh` | Analyzes the quotio fork for patterns in providers, UI, auth, and multi-account features |\n\n### Utilities\n\n| Script | Purpose |\n|--------|---------|\n| `build_icon.sh` | Converts `.icon` bundle to `.icns` using Xcode's ictool/icontool |\n| `docs-list.mjs` | Scans `docs/` for Markdown files and extracts `summary` and `read_when` metadata |\n\n---\n\n## Key Components\n\n### Code Signing Strategy\n\nThe build system handles three signing modes:\n\n1. **Adhoc** (`CODEXBAR_SIGNING=adhoc`): Uses `-` signature; clears keychain entries between builds to avoid permission prompts\n2. **Development** (`APP_IDENTITY` env var): Uses a self-signed certificate created by `setup_dev_signing.sh`\n3. **Release** (Developer ID): Uses `Developer ID Application: Peter Steinberger (Y5PE65HELJ)`\n\nThe `compile_and_run.sh` script detects available identities and falls back appropriately:\n\n```bash\nresolve_signing_mode() {\n  if has_signing_identity \"${APP_IDENTITY:-}\"; then\n    SIGNING_MODE=\"identity\"\n  elif has_signing_identity \"CodexBar Development\"; then\n    APP_IDENTITY=\"CodexBar Development\"\n    SIGNING_MODE=\"identity\"\n  else\n    SIGNING_MODE=\"adhoc\"\n  fi\n}\n```\n\n### Locking Mechanism\n\n`compile_and_run.sh` uses file-based locking to prevent concurrent builds on the same machine:\n\n```bash\nLOCK_DIR=\"${TMPDIR:-/tmp}/codexbar-compile-and-run-${LOCK_KEY}\"\n```\n\nIf another agent is building, the script either waits (`--wait`) or exits gracefully.\n\n### KeyboardShortcuts Patching\n\n`package_app.sh` patches the KeyboardShortcuts library at build time to fix a bundle lookup issue:\n\n```swift\n// Replaces: Bundle.module\n// With:     Bundle.keyboardShortcutsSafeBundle\n```\n\nThis avoids crashes when the resource bundle isn't at the expected location.\n\n### Sparkle Integration\n\nRelease scripts use Ed25519 keys for appcast signing:\n\n- **Private key**: `SPARKLE_PRIVATE_KEY_FILE` environment variable\n- **Public key**: Embedded in `Info.plist` (`SUPublicEDKey`)\n- **Verification**: `verify_appcast.sh` uses `sign_update --verify`\n\n---\n\n## Usage Patterns\n\n### Daily Development\n\n```bash\n# Quick build and launch\n./Scripts/compile_and_run.sh\n\n# Or just launch if already built\n./Scripts/launch.sh\n\n# Lint and format before committing\n./Scripts/lint.sh format\n./Scripts/lint.sh lint\n```\n\n### Release Process\n\n```bash\n# Full release (requires env vars)\nSPARKLE_PRIVATE_KEY_FILE=~/keys/sparkle.key \\\nAPP_STORE_CONNECT_API_KEY_P8=... \\\nAPP_STORE_CONNECT_KEY_ID=... \\\nAPP_STORE_CONNECT_ISSUER_ID=... \\\n./Scripts/release.sh\n```\n\n### Upstream Contribution\n\n```bash\n# Check for upstream changes\n./Scripts/check_upstreams.sh\n\n# Create a review branch\n./Scripts/review_upstream.sh upstream\n\n# After review, prepare a clean PR branch\n./Scripts/prepare_upstream_pr.sh fix-cursor-bonus\n```\n\n---\n\n## Environment Variables\n\nKey variables that control script behavior:\n\n| Variable | Used By | Purpose |\n|----------|---------|---------|\n| `CODEXBAR_SIGNING` | `package_app.sh`, `compile_and_run.sh` | Override signing mode |\n| `APP_IDENTITY` | `package_app.sh`, `sign-and-notarize.sh` | Code signing identity |\n| `CODEXBAR_ALLOW_LLDB` | `package_app.sh` | Enable debug symbols in release |\n| `ARCHES` | `package_app.sh`, `compile_and_run.sh` | Build architectures (e.g., `arm64 x86_64`) |\n| `SPARKLE_PRIVATE_KEY_FILE` | `make_appcast.sh`, `verify_appcast.sh` | Ed25519 signing key |\n| `APP_STORE_CONNECT_*` | `sign-and-notarize.sh` | Apple notary credentials |\n\n---\n\n## File Structure\n\n```\nScripts/\n├── analyze_quotio.sh        # Fork pattern analysis\n├── build_icon.sh            # Icon generation\n├── changelog-to-html.sh     # Markdown → HTML\n├── check-release-assets.sh  # Asset verification\n├── check_upstreams.sh       # Upstream monitoring\n├── compile_and_run.sh       # Dev workflow\n├── docs-list.mjs            # Documentation index\n├── install_lint_tools.sh    # Lint setup\n├── launch.sh                # Simple launcher\n├── lint.sh                  # Code quality\n├── make_appcast.sh          # Sparkle feed\n├── package_app.sh           # App bundle\n├── prepare_upstream_pr.sh   # PR preparation\n├── release.sh               # Full release\n├── review_upstream.sh       # Review branch\n├── setup_dev_signing.sh     # Dev certificates\n├── sign-and-notarize.sh    # Notarization\n├── test_live_update.sh     # Update testing\n├── validate_changelog.sh   # Changelog check\n└── verify_appcast.sh       # Appcast verification\n```\n\n---\n\n## Connections to Other Modules\n\nThe Scripts module is the operational layer that builds and releases the codebase defined in `Sources/`. Key connections:\n\n- **`Sources/CodexBar/`**: The main app that gets built, packaged, and signed\n- **`Sources/CodexBarCLI/`**: Built alongside the app and placed in `Contents/Helpers/`\n- **`Sources/CodexBarWidget/`**: Built as a widget extension in `Contents/PlugIns/`\n- **`version.env`**: Version file sourced by build and release scripts\n- **`CHANGELOG.md`**: Validated and processed by release scripts\n- **`appcast.xml`**: Generated and updated by release scripts\n- **`docs/`**: Indexed by `docs-list.mjs`\n\nThe scripts do not call into Swift code—they operate on the built artifacts and project files.","sources-codexbar":"# Sources — CodexBar\n\n<think>\nThe user wants me to write comprehensive documentation for the **Sources — CodexBar** module. Let me analyze the code provided to understand what this module does.\n\nLooking at the files provided:\n1. `About.swift` - Shows the About panel for the app\n2. `AppNotifications.swift` - Handles notification permissions and posting\n3. `ClaudeLoginRunner.swift` - Handles Claude CLI login flow\n4. `CodexLoginRunner.swift` - Handles Codex CLI login flow\n5. `CodexbarApp.swift` - Main app entry point and AppDelegate\n6. `CodexBarConfigMigrator.swift` - Migrates legacy config to new format\n7. `CookieHeaderStore.swift` - Stores cookies in keychain\n8. `CopilotTokenStore.swift` - Stores Copilot tokens in keychain\n9. `CostHistoryChartMenuView.swift` - SwiftUI chart for cost history\n10. `CreditsHistoryChartMenuView.swift` - SwiftUI chart for credits history\n11. `CursorLoginRunner.swift` - Handles Cursor login via WebKit\n12. `Date+RelativeDescription.swift` - Date formatting utilities\n13. `DisplayLink.swift` - Display link driver for UI updates\n14. `GeminiLoginRunner.swift` - Handles Gemini CLI login\n15. `HiddenWindowView.swift` - Hidden window for SwiftUI lifecycle\n16. `IconRenderer.swift` - Renders menu bar icons\n\nThis is a macOS menu bar application called CodexBar that tracks usage/costs for various AI providers (Codex, Claude, Cursor, etc.).\n\nThe source code was truncated, but I have enough to understand the module. Let me write comprehensive documentation.\n\nKey aspects to cover:\n1. Module overview/purpose\n2. App lifecycle (CodexbarApp.swift, AppDelegate)\n\n\n3. Authentication flows (ClaudeLoginRunner, CodexLoginRunner, CursorLoginRunner, GeminiLoginRunner)\n4. Storage layer (CookieHeaderStore, CopilotTokenStore)\n5. UI components (CostHistoryChartMenuView, CreditsHistoryChartMenuView, IconRenderer)\n6. Configuration management (CodexBarConfigMigrator)\n7. Notifications (AppNotifications)\n8. Utilities (Date+RelativeDescription, DisplayLink, HiddenWindowView)\n\nI'll organize this with clear sections and include a Mermaid diagram to show how the components interact.\n</think>\n\n# CodexBar Module Documentation\n\nThe **CodexBar** module is the main macOS application target for CodexBar — a menu bar application that tracks usage, costs, and credits across multiple AI provider services (Codex, Claude, Cursor, Gemini, Copilot, etc.). It provides a status bar interface, authentication flows for each provider, persistent credential storage, and visual cost/credits history charts.\n\n---\n\n## Architecture Overview\n\nCodexBar runs as a menu bar (status bar) application on macOS. The app presents usage information directly in the system menu bar, with a dropdown showing cost breakdowns, historical charts, and provider management.\n\n```mermaid\nflowchart TB\n    subgraph App[\"CodexBar App\"]\n        A[\"CodexbarApp<br>@main entry\"]\n        AD[\"AppDelegate\"]\n        SC[\"StatusItemController\"]\n    end\n    \n    subgraph Auth[\"Authentication\"]\n        CL[\"ClaudeLoginRunner\"]\n        CoL[\"CodexLoginRunner\"]\n        CuL[\"CursorLoginRunner\"]\n        GL[\"GeminiLoginRunner\"]\n    end\n    \n    subgraph Storage[\"Credential Storage\"]\n        CHS[\"CookieHeaderStore\"]\n        CTS[\"CopilotTokenStore\"]\n    end\n    \n    subgraph UI[\"UI Components\"]\n        IR[\"IconRenderer\"]\n        CH[\"CostHistoryChartMenuView\"]\n        CR[\"CreditsHistoryChartMenuView\"]\n    end\n    \n    subgraph Config[\"Configuration\"]\n        CCM[\"CodexBarConfigMigrator\"]\n    end\n    \n    A --> AD\n    AD --> SC\n    AD --> Auth\n    Auth --> Storage\n    SC --> UI\n    UI --> Config\n```\n\n---\n\n## App Lifecycle\n\n### Main Entry Point\n\n**`CodexbarApp.swift`** — The SwiftUI-based main entry point.\n\n```swift\n@main\nstruct CodexBarApp: App {\n    @NSApplicationDelegateAdaptor(AppDelegate.self) private var appDelegate\n    @State private var settings: SettingsStore\n    @State private var store: UsageStore\n    // ...\n}\n```\n\nKey responsibilities:\n- Initializes logging via `CodexBarLog.bootstrapIfNeeded()`\n- Creates the `SettingsStore` and `UsageStore` (core data stores)\n- Configures the `AppDelegate` with dependencies\n- Sets up two SwiftUI scenes:\n  - **Lifecycle keepalive window** — A hidden 1×1 window that keeps SwiftUI's lifecycle active so the Settings scene can use native toolbar tabs\n  - **Settings scene** — Opens the preferences window using SwiftUI's `Settings` scene\n\n### App Delegate\n\nThe **`AppDelegate`** manages the app's lifecycle and coordinates core components:\n\n```swift\n@MainActor\nfinal class AppDelegate: NSObject, NSApplicationDelegate {\n    let updaterController: UpdaterProviding\n    private var statusController: StatusItemControlling?\n    private var store: UsageStore?\n    private var settings: SettingsStore?\n}\n```\n\n**Key behaviors:**\n- `applicationDidFinishLaunching()` — Requests notification permissions, ensures the status item controller exists, registers keyboard shortcuts\n- `configureAppIconForMacOSVersion()` — Uses classic app icon on macOS versions before 26 (applies non-Liquid Glass appearance)\n- `ensureStatusController()` — Creates the `StatusItemController` that manages the menu bar item\n\n### Hidden Window for Lifecycle\n\n**`HiddenWindowView.swift`** — Provides a workaround for SwiftUI's Settings scene. The Settings scene requires at least one window to function, but CodexBar is primarily an AppKit menu bar app. The hidden window keeps SwiftUI's lifecycle alive.\n\n```swift\nstruct HiddenWindowView: View {\n    var body: some View {\n        Color.clear\n            .frame(width: 20, height: 20)\n            .onAppear {\n                // Make the window truly invisible and non-interactive\n                window.styleMask = [.borderless]\n                window.isOpaque = false\n                window.alphaValue = 0\n                window.ignoresMouseEvents = true\n            }\n    }\n}\n```\n\n---\n\n## Authentication Flows\n\nCodexBar supports multiple AI providers, each with its own authentication mechanism. Login runners handle the OAuth/token acquisition flow for each provider.\n\n### Claude Login\n\n**`ClaudeLoginRunner.swift`** — Runs the `claude` CLI with `/login` subcommand in a pseudo-terminal (PTY).\n\n```swift\nstruct ClaudeLoginRunner {\n    static func run(timeout: TimeInterval = 120, onPhaseChange: @escaping @Sendable (Phase) -> Void) async -> Result\n}\n```\n\n**Flow:**\n1. Spawns a PTY with `TTYCommandRunner` running `claude /login`\n2. Monitors for success strings (`\"Successfully logged in\"`, `\"Login successful\"`)\n3. Extracts the OAuth URL from terminal output using regex\n4. Opens browser for user authentication\n5. Waits for CLI to confirm successful login\n\n### Codex Login\n\n**`CodexLoginRunner.swift`** — Runs the Codex CLI `login` subcommand directly.\n\n```swift\nstruct CodexLoginRunner {\n    static func run(timeout: TimeInterval = 120) async -> Result\n}\n```\n\n**Flow:**\n1. Resolves the `codex` binary using `BinaryLocator`\n2. Runs the process with `Process`, capturing stdout/stderr\n3. Attaches to the process group for proper termination\n4. Waits with timeout, terminates gracefully on timeout\n\n### Cursor Login\n\n**`CursorLoginRunner.swift`** — Uses WebKit to perform OAuth login in an embedded browser window.\n\n```swift\n@MainActor\nfinal class CursorLoginRunner: NSObject {\n    func run(onPhaseChange: @escaping @Sendable (Phase) -> Void) async -> Result\n}\n```\n\n**Flow:**\n1. Creates a `WKWebView` in a dedicated window\n2. Navigates to `https://cursor.com/dashboard`\n3. Detects navigation to authenticator URL (login page)\n4. Monitors for redirect back to dashboard after auth\n5. Extracts session cookies from `WKWebsiteDataStore`\n6. Stores cookies in `CursorSessionStore`\n\n### Gemini Login\n\n**`GeminiLoginRunner.swift`** — Launches the Gemini CLI which prompts for OAuth authentication.\n\n```swift\nenum GeminiLoginRunner {\n    static func run(onCredentialsCreated: (@Sendable () -> Void)? = nil) async -> Result\n}\n```\n\n**Flow:**\n1. Clears existing credentials (enables account switching)\n2. Creates a temporary `.command` script that runs `gemini`\n3. Opens the script in Terminal (which triggers the OAuth prompt)\n4. Watches for `~/.gemini/oauth_creds.json` to appear\n5. Calls callback when credentials are created\n\n---\n\n## Credential Storage\n\nCredentials are stored securely in the macOS Keychain.\n\n### Cookie Header Store\n\n**`CookieHeaderStore.swift`** — Stores session cookies for web-based providers (Codex, Claude, Cursor, etc.).\n\n```swift\nstruct KeychainCookieHeaderStore: CookieHeaderStoring {\n    func loadCookieHeader() throws -> String?\n    func storeCookieHeader(_ header: String?) throws\n}\n```\n\n**Features:**\n- 30-minute in-memory cache to reduce keychain access frequency\n- Normalizes cookies before storage\n- Handles keychain interaction prompts via `KeychainPromptHandler`\n- Respects `KeychainAccessGate` (can be disabled for debugging)\n\n### Copilot Token Store\n\n**`CopilotTokenStore.swift`** — Stores GitHub Copilot API tokens.\n\n```swift\nstruct KeychainCopilotTokenStore: CopilotTokenStoring {\n    func loadToken() throws -> String?\n    func storeToken(_ token: String?) throws\n}\n```\n\n**Features:**\n- Uses `kSecAttrAccessibleAfterFirstUnlockThisDeviceOnly` for security\n- Trims whitespace from stored tokens\n- Provides `CopilotTokenStoreError` for error handling\n\n---\n\n## Configuration Migration\n\n**`CodexBarConfigMigrator.swift`** — Migrates legacy user defaults and keychain items to the new `CodexBarConfig` format.\n\n```swift\nstruct CodexBarConfigMigrator {\n    static func loadOrMigrate(\n        configStore: CodexBarConfigStore,\n        userDefaults: UserDefaults,\n        stores: LegacyStores) -> CodexBarConfig\n}\n```\n\n**Migrates:**\n- Provider order and toggle states from `UserDefaults`\n- Cookie sources from legacy keys\n- Token providers (ZAI, Synthetic, Copilot, KimiK2)\n- Cookie providers (Codex, Claude, Cursor, Factory, Augment, Amp)\n- MiniMax (token + region + cookie)\n- Kimi (token or manual cookie header)\n- OpenCode (cookie + workspace ID)\n- Legacy token accounts\n\nAfter migration, clears legacy stores to prevent duplicate credentials.\n\n---\n\n## UI Components\n\n### Icon Renderer\n\n**`IconRenderer.swift`** — Renders the menu bar icon dynamically based on usage remaining.\n\n```swift\nenum IconRenderer {\n    static func makeIcon(\n        primaryRemaining: Double?,\n        weeklyRemaining: Double?,\n        creditsRemaining: Double?,\n        stale: Bool,\n        style: IconStyle,\n        blink: CGFloat = 0,\n        wiggle: CGFloat = 0,\n        tilt: CGFloat = 0,\n        statusIndicator: ProviderStatusIndicator = .none) -> NSImage\n}\n```\n\n**Features:**\n- Renders at 18×18pt (36×36px at 2×) for menu bar\n- Provider-specific visual twists:\n  - **Codex** — Face with eyes and hat\n  - **Claude** — Blocky crab-style with arms, legs, vertical eyes\n  - **Gemini** — Sparkle eyes (4-pointed stars), decorative points\n  - **Cursor** — Notches (similar to Claude but simpler)\n  - **Factory** — 8-pointed asterisk eyes with cog teeth\n- Animation support: blink, wiggle, tilt\n- Caching with `IconCacheStore` (64 icons) and `MorphCache` (512 morph frames)\n\n### Cost History Chart\n\n**`CostHistoryChartMenuView.swift`** — SwiftUI chart showing daily costs over the past 30 days.\n\n- Interactive: hover to see per-day details (cost, token count, top models)\n- Highlights peak day with yellow cap\n- Uses `Charts` framework with custom overlay for mouse tracking\n\n### Credits History Chart\n\n**`CreditsHistoryChartMenuView.swift`** — SwiftUI chart showing OpenAI credits usage.\n\n- Similar interaction to Cost History\n- Groups by service (ChatGPT, API, etc.)\n- Shows total 30-day credits used\n\n### Display Link Driver\n\n**`DisplayLink.swift`** — Minimal display link driver for UI updates.\n\n```swift\n@MainActor\n@Observable\nfinal class DisplayLinkDriver {\n    var tick: Int = 0\n    func start(fps: Double = 12)\n    func stop()\n}\n```\n\n- Uses `NSScreen.displayLink` on macOS 15+\n- Falls back to `CVDisplayLink` on macOS 14\n- Publishes ticks at configurable frame rate (default 12 fps)\n- Drives SwiftUI updates without blocking the main thread\n\n---\n\n## Notifications\n\n**`AppNotifications.swift`** — Handles local notification permissions and posting.\n\n```swift\n@MainActor\nfinal class AppNotifications {\n    static let shared = AppNotifications()\n    \n    func requestAuthorizationOnStartup()\n    func post(idPrefix: String, title: String, body: String, badge: NSNumber? = nil)\n}\n```\n\n**Features:**\n- Requests notification authorization on app startup\n- Posts notifications with unique IDs (`codexbar-{prefix}-{UUID}`)\n- Skips posting when running under tests (detects XCTest, Swift Testing, non-bundle runs)\n- Uses `UNUserNotificationCenter.current()`\n\n---\n\n## Utilities\n\n### Date Relative Description\n\n**`Date+RelativeDescription.swift`** — Human-readable relative time formatting.\n\n```swift\nextension Date {\n    @MainActor\n    func relativeDescription(now: Date = .now) -> String\n}\n```\n\nReturns strings like \"just now\", \"5 minutes ago\", \"2 days ago\".\n\n### About Panel\n\n**`About.swift`** — Customizes the standard macOS About panel.\n\n- Sets app name, version, build number\n- Adds clickable links (GitHub, Website, Twitter, Email)\n- Shows build timestamp and git commit (with \"DEBUG BUILD\" tag in debug builds)\n- Removes focus ring around app icon for cleaner appearance\n\n---\n\n## Integration Points\n\nThe CodexBar module depends on:\n\n| Module/Package | Purpose |\n|---------------|---------|\n| `CodexBarCore` | Core types (`UsageProvider`, `ProviderConfig`, `SettingsStore`, `UsageStore`, logging) |\n| `AppKit` | Menu bar, windows, NSApplication |\n| `SwiftUI` | Preferences UI, Charts |\n| `KeyboardShortcuts` | Global keyboard shortcut handling |\n| `UserNotifications` | Local notifications |\n| `Security` | Keychain access |\n| `Sparkle` (optional) | Auto-update support |\n\n---\n\n## Key Design Decisions\n\n1. **Menu bar app with hidden window** — Uses a 1×1 hidden window to keep SwiftUI's Settings scene functional while remaining primarily an AppKit menu bar app\n\n2. **Multiple auth flows** — Each provider uses a different auth mechanism (CLI PTY, direct process, WebKit browser, or external CLI prompt)\n\n3. **Keychain with caching** — Cookie/token stores use keychain for security but cache in memory (30 min TTL) to reduce latency\n\n4. **Provider-specific icons** — Each AI provider has a distinct visual style in the menu bar (face, crab, sparkle, etc.)\n\n5. **Legacy migration** — Config migrator ensures users upgrading from older versions don't lose their settings\n\n6. **Test-safe** — Authentication runners and notifications detect test environments and skip operations that would fail in headless/test contexts","sources-codexbarclaudewatchdog":"# Sources — CodexBarClaudeWatchdog\n\n<think>\nLet me analyze this module carefully to write comprehensive documentation.\n\n## Understanding the Module\n\nThis is a standalone executable called `CodexBarClaudeWatchdog` that acts as a process supervisor/watchdog. Let me break down what it does:\n\n1. **Purpose**: Spawns a child process and monitors it, ensuring proper cleanup when the watchdog receives termination signals or when the watchdog's parent dies (orphaned).\n\n2. **Key Functions**:\n   - `usageAndExit()`: Prints usage info and exits\n   - `killProcessTree()`: Kills the child process and its entire process group\n   - `exitCode()`: Translates wait status to proper exit code\n   - `terminateChild()`: Wrapper to kill the child process tree\n   - `handleTerminationSignal()`: Signal handler for SIGTERM, SIGINT, SIGHUP\n\n3. **Execution Flow**:\n   - Parse command line arguments (expects `--` separator)\n   - Spawn the child process using `posix_spawnp`\n   - Set up signal handlers\n   - Enter main loop that:\n     - Checks if child has exited\n     - Checks if watchdog received termination signal\n     - Checks if parent process died (ppid == 1, meaning reaped by init)\n   - On any of these conditions, kills the process tree and exits with appropriate code\n\n4. **Key Behaviors**:\n   - Uses `setpgid` to put child in its own process group (allows killing entire tree)\n   - Graceful termination: sends SIGTERM, waits 0.5s, then SIGKILL if needed\n   - Returns child's exit code to parent\n   - Returns 128 + signal for forced terminations\n\nThis is a \"daemontools\" style supervise process - a classic pattern in Unix systems.\n\nLet me structure the documentation:\n\n1. Overview/Purpose\n2. How It Works (the main flow)\n\n\n3. Command-line Interface\n4. Signal Handling\n5. Process Group Management\n6. Exit Codes\n7. Design Rationale\n8. Usage Example\n\nI'll create a simple Mermaid diagram to show the architecture since it helps visualize the watchdog-child relationship.\n</think>\n\n# CodexBarClaudeWatchdog — Process Supervisor\n\nThe `CodexBarClaudeWatchdog` module implements a minimal process supervisor that spawns a child process, monitors its lifecycle, and ensures proper cleanup when the supervisor itself receives termination signals or becomes orphaned.\n\n## Purpose\n\nThis watchdog is designed to manage long-running child processes in a robust, Unix-friendly way:\n\n- **Lifecycle management**: Spawn a child and wait for it to complete\n- **Signal forwarding**: Forward termination signals (SIGTERM, SIGINT, SIGHUP) to the child\n- **Orphan detection**: Detect when the watchdog's parent has died (adopted by init/PID 1) and clean up the child\n- **Process group cleanup**: Kill the entire process tree, not just the direct child\n\nIt follows the classic \"supervise\" pattern used by tools like `daemontools`, `runit`, and systemd.\n\n## Usage\n\n```bash\nCodexBarClaudeWatchdog -- <binary> [args...]\n```\n\nThe `--` separator is required. Everything after it is passed as the child process arguments.\n\n```bash\n# Example: run Claude Code with the watchdog\nCodexBarClaudeWatchdog -- claude --dangerously-skip-permissions .\n```\n\n## How It Works\n\n```mermaid\nflowchart TD\n    A[Start] --> B[Parse args, find -- separator]\n    B --> C[Spawn child via posix_spawnp]\n    C --> D[Set up signal handlers]\n    D --> E[Enter monitoring loop]\n    \n    E --> F{Child exited?}\n    F -->|Yes| G[Exit with child's code]\n    F -->|No| H{Signal received?}\n    H -->|Yes| I[Kill process tree, exit 128+sig]\n    H -->|No| J{Parent died?}\n    J -->|Yes| K[Kill process tree, exit child's code]\n    J -->|No| E\n```\n\n### Initialization\n\n1. **Argument parsing**: The module expects `CodexBarClaudeWatchdog -- <binary> [args...]`. It locates the `--` separator and treats everything after it as the child command.\n2. **Process spawning**: Uses `posix_spawnp()` to create the child process, inheriting the environment from `environ`.\n3. **Process group isolation**: Calls `setpgid(globalChildPID, globalChildPID)` to place the child in its own process group—this enables killing the entire tree later.\n\n### Monitoring Loop\n\nThe main loop runs every ~200ms and checks three conditions:\n\n| Condition | Action |\n|-----------|--------|\n| Child has exited | Exit with child's exit code |\n| Watchdog received a signal (SIGTERM, SIGINT, SIGHUP) | Kill process tree, exit with code `128 + signal` |
