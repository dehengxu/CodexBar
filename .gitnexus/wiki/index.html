t supported on Linux.\n\n### What It Tests\n\n| Test | Purpose |\n|------|---------|\n| `claudeWebFetcher_isNotSupportedOnLinux` | Confirms `fetchUsage()` throws `.notSupportedOnThisPlatform` |\n| `claudeWebFetcher_hasSessionKey_isFalseOnLinux` | Validates that `hasSessionKey()` returns `false` when called with `nil` on Linux |\n| `claudeWebFetcher_sessionKeyInfo_throwsOnLinux` | Ensures `sessionKeyInfo()` throws the platform error |\n\nThese tests use `#if os(Linux)` conditional compilation to verify Linux-specific behavior while remaining valid Swift on other platforms.\n\n---\n\n## Relationship to Core Module\n\nThe tests reference `CodexBarCore`, indicating they test types defined in the main codebase:\n\n```\nCodexBarCore (production code)\n├── JetBrainsStatusProbe\n│   └── parseXMLData()  ← tested by JetBrainsParserLinuxTests\n├── JetBrainsStatusProbeError\n│   └── .noQuotaInfo   ← expected error type\n└── ClaudeWebAPIFetcher\n    ├── fetchUsage()   ← tested by PlatformGatingTests\n    ├── hasSessionKey()\n    └── sessionKeyInfo()\n```\n\nThe `JetBrainsStatusProbe` type has two implementations:\n- **Linux**: Regex-based parsing via `parseXMLData()` (tested here)\n- **macOS/Windows**: libxml2-based parsing (tested in platform-specific test suites)\n\n---\n\n## Architecture Notes\n\n### Why Regex Instead of libxml2?\n\nLinux environments in CI may lack the full libxml2 development headers. The regex-based parser provides a fallback that extracts the same data using Swift's `NSRegularExpression` and `NSString` APIs.\n\n### Platform Gating Pattern\n\nThe `ClaudeWebAPIFetcher` uses a common pattern for cross-platform code:\n\n```swift\n#if os(Linux)\nthrow FetchError.notSupportedOnThisPlatform\n#else\n// Actual implementation\n#endif\n```\n\nThis ensures the codebase compiles on all platforms while explicitly rejecting unsupported operations at runtime.\n\n---\n\n## Running These Tests\n\nExecute the Linux-specific tests with:\n\n```bash\nswift test --filter TestsLinux\n```\n\nOr run individual suites:\n\n```swift\nswift test --filter JetBrainsParserLinuxTests\nswift test --filter PlatformGatingTests\n```"};

(function() {
  var activePage = 'overview';

  document.addEventListener('DOMContentLoaded', function() {
    mermaid.initialize({ startOnLoad: false, theme: 'neutral', securityLevel: 'loose' });
    renderMeta();
    renderNav();
    document.getElementById('menu-toggle').addEventListener('click', function() {
      document.getElementById('sidebar').classList.toggle('open');
    });
    if (location.hash && location.hash.length > 1) {
      activePage = decodeURIComponent(location.hash.slice(1));
    }
    navigateTo(activePage);
  });

  function renderMeta() {
    if (!META) return;
    var el = document.getElementById('meta-info');
    var parts = [];
    if (META.generatedAt) {
      parts.push(new Date(META.generatedAt).toLocaleDateString());
    }
    if (META.model) parts.push(META.model);
    if (META.fromCommit) parts.push(META.fromCommit.slice(0, 8));
    el.textContent = parts.join(' \u00b7 ');
  }

  function renderNav() {
    var container = document.getElementById('nav-tree');
    var html = '<div class="nav-section">';
    html += '<a class="nav-item overview" data-page="overview" href="#overview">Overview</a>';
    html += '</div>';
    if (TREE.length > 0) {
      html += '<div class="nav-group-label">Modules</div>';
      html += buildNavTree(TREE);
    }
    container.innerHTML = html;
    container.addEventListener('click', function(e) {
      var target = e.target;
      while (target && !target.dataset.page) { target = target.parentElement; }
      if (target && target.dataset.page) {
        e.preventDefault();
        navigateTo(target.dataset.page);
      }
    });
  }

  function buildNavTree(nodes) {
    var html = '';
    for (var i = 0; i < nodes.length; i++) {
      var node = nodes[i];
      html += '<div class="nav-section">';
      html += '<a class="nav-item" data-page="' + escH(node.slug) + '" href="#' + encodeURIComponent(node.slug) + '">' + escH(node.name) + '</a>';
      if (node.children && node.children.length > 0) {
        html += '<div class="nav-children">' + buildNavTree(node.children) + '</div>';
      }
      html += '</div>';
    }
    return html;
  }

  function escH(s) {
    var d = document.createElement('div');
    d.textContent = s;
    return d.innerHTML;
  }

  function navigateTo(page) {
    activePage = page;
    location.hash = encodeURIComponent(page);

    var items = document.querySelectorAll('.nav-item');
    for (var i = 0; i < items.length; i++) {
      if (items[i].dataset.page === page) {
        items[i].classList.add('active');
      } else {
        items[i].classList.remove('active');
      }
    }

    var contentEl = document.getElementById('content');
    var md = PAGES[page];

    if (!md) {
      contentEl.innerHTML = '<div class="empty-state"><h2>Page not found</h2><p>' + escH(page) + '.md does not exist.</p></div>';
      return;
    }

    contentEl.innerHTML = marked.parse(md);

    // Rewrite .md links to hash navigation
    var links = contentEl.querySelectorAll('a[href]');
    for (var i = 0; i < links.length; i++) {
      var href = links[i].getAttribute('href');
      if (href && href.endsWith('.md') && href.indexOf('://') === -1) {
        var slug = href.replace(/\.md$/, '');
        links[i].setAttribute('href', '#' + encodeURIComponent(slug));
        (function(s) {
          links[i].addEventListener('click', function(e) {
            e.preventDefault();
            navigateTo(s);
          });
        })(slug);
      }
    }

    // Convert mermaid code blocks into mermaid divs
    var mermaidBlocks = contentEl.querySelectorAll('pre code.language-mermaid');
    for (var i = 0; i < mermaidBlocks.length; i++) {
      var pre = mermaidBlocks[i].parentElement;
      var div = document.createElement('div');
      div.className = 'mermaid';
      div.textContent = mermaidBlocks[i].textContent;
      pre.parentNode.replaceChild(div, pre);
    }
    try { mermaid.run({ querySelector: '.mermaid' }); } catch(e) {}

    window.scrollTo(0, 0);
    document.getElementById('sidebar').classList.remove('open');
  }
})();

</script>
</body>
</html>
