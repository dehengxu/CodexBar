\n| Parent process died (PPID == 1) | Kill process tree, exit with child's exit code |\n\n### Process Tree Termination\n\nWhen the watchdog needs to stop the child, it performs a graceful shutdown:\n\n1. Send SIGTERM to the child's entire process group (`kill(-pgid, SIGTERM)`)\n2. Wait up to 0.5 seconds for the child to exit\n3. If the child persists, send SIGKILL to the process group\n\nThis two-phase approach gives the child a chance to handle cleanup (flush buffers, release resources) before being forcefully terminated.\n\n## Exit Codes\n\n| Code | Meaning |\n|------|---------|\n| 0-255 | Child's native exit status |\n| 64 | Usage error (missing arguments) |\n| 70 | Failed to spawn child |\n| 128 + n | Watchdog terminated by signal n |\n\n## Signal Handling\n\nThe watchdog installs handlers for three signals:\n\n- **SIGTERM**: Graceful termination request\n- **SIGINT**: Interrupt (Ctrl+C)\n- **SIGHUP**: Hangup (often used to signal config reload or restart)\n\nWhen any of these arrive, the watchdog:\n1. Records the signal number in `globalShouldTerminate`\n2. Kills the process tree\n3. Exits with code `128 + signal`\n\nThis allows the parent (or container orchestrator) to know the watchdog was intentionally stopped, not that it crashed.\n\n## Key Implementation Details\n\n### Process Group Management\n\n```swift\nlet pgid = getpgid(childPID)\nkill(-pgid, SIGTERM)  // Negative PID = kill entire process group\n```\n\nBy putting the child in its own process group, we can kill all descendant processes (any subprocesses the child may have spawned) with a single signal.\n\n### Exit Code Extraction\n\nUnix `wait` status encoding is quirky. The module manually decodes it:\n\n```swift\nlet low = status & 0x7F  // Lower 7 bits = signal number (0 = no signal)\nif low == 0 {\n    return (status >> 8) & 0xFF  // Upper byte = exit status\n}\n// Otherwise: process was killed by signal\n```\n\n### Global State\n\nThe module uses `nonisolated(unsafe)` globals for inter-thread communication:\n\n```swift\nprivate nonisolated(unsafe) var globalChildPID: pid_t = 0\nprivate nonisolated(unsafe) var globalShouldTerminate: Int32 = 0\n```\n\nThese allow the signal handler (which runs asynchronously) to communicate with the main loop.\n\n## Why This Exists\n\nThis watchdog provides reliability guarantees that simple process spawning lacks:\n\n1. **Orphan handling**: If the watchdog's parent dies unexpectedly, the child is cleaned up rather than becoming a zombie or orphan.\n2. **Signal propagation**: The watchdog shields the child from signals until it's ready to handle them, or ensures clean shutdown.\n3. **Process group isolation**: Child subprocesses are guaranteed to be cleaned up, not just the immediate child.\n\nIn the broader CodexBar system, this watchdog likely wraps Claude Code or similar tools to ensure they're managed correctly within a larger process supervision tree.","sources-codexbarclaudewebprobe":"# Sources — CodexBarClaudeWebProbe\n\n<think>\nThe user wants me to write documentation for the **CodexBarClaudeWebProbe** module. Let me analyze the code:\n\n1. **Module Structure**: This is a Swift command-line tool with `@main` enum `CodexBarClaudeWebProbe`\n2. **Purpose**: It's a probe that tests various Claude.ai API endpoints to see which ones are accessible and what they return\n3. **Key Components**:\n   - `defaultEndpoints` - array of URLs to probe\n   - `main()` async function - entry point\n   - `printResult()` - formats and prints probe results\n4. **Dependencies** (inferred from imports):\n   - `CodexBarCore` - likely contains `ClaudeWebAPIFetcher` and `BrowserDetection`\n   - `Foundation`\n\n5. **Functionality**:\n   - Takes command-line arguments for custom endpoints (or uses defaults)\n   - Uses `CLAUDE_WEB_PROBE_PREVIEW` env var to enable preview mode\n   - Calls `ClaudeWebAPIFetcher.probeEndpoints()` to test each endpoint\n   - Prints results including: URL, status code, content type, top-level keys, emails found, plan hints, notable fields, and body preview\n\nLet me structure the documentation:\n\n1. **Overview** - What this module does\n2. **Usage** - How to run it\n3. **Configuration** - Environment variables and arguments\n4. **Output Format** - What the results look like\n5. **Dependencies** - What it relies on (CodexBarCore)\n6. **Integration** - How it connects to the rest of the codebase\n\nSince this is a simple, single-file CLI tool, I don't think a Mermaid diagram would add much value. The call graph shows no connections, so it's fairly isolated.\n\nLet me write clear, developer-focused documentation.\n</think>\n\n# CodexBarClaudeWebProbe Module\n\nA command-line utility that probes Claude.ai web API endpoints to discover accessible routes and their response structures.\n\n## Overview\n\n`CodexBarClaudeWebProbe` is a diagnostic tool designed to explore the Claude.ai web application's API surface. It sends HTTP requests to various endpoints and inspects responses to identify:\n\n- Which endpoints are accessible (return HTTP 200 or other valid status codes)\n- What content types each endpoint returns\n- The JSON structure of responses (top-level keys)\n- Any email addresses or user identifiers exposed in responses\n- Plan-related hints (Team, Pro, etc.)\n- Other notable fields in the response body\n\nThis module is primarily used during development and research to understand how the Claude.ai web client communicates with its backend.\n\n## Usage\n\n### Basic Invocation\n\n```bash\n# Probe all default endpoints\nswift run CodexBarClaudeWebProbe\n```\n\n### Custom Endpoints\n\n```bash\n# Probe specific endpoints\nswift run CodexBarClaudeWebProbe https://claude.ai/api/user https://claude.ai/api/me\n```\n\n### Preview Mode\n\nEnable preview mode to include raw body previews in output:\n\n```bash\nCLAUDE_WEB_PROBE_PREVIEW=1 swift run CodexBarClaudeWebProbe\n```\n\n## Command-Line Interface\n\n### Arguments\n\n| Argument | Description |\n|----------|-------------|\n| `endpoint[s]` | Zero or more URLs to probe. If omitted, the default endpoint list is used. |\n\n### Environment Variables\n\n| Variable | Description |\n|----------|-------------|\n| `CLAUDE_WEB_PROBE_PREVIEW` | Set to `1` to include raw response body previews in output. |\n\n## Default Endpoints\n\nThe tool includes a predefined list of 13 endpoints to probe:\n\n```\nhttps://claude.ai/api/organizations\nhttps://claude.ai/api/organizations/{orgId}/usage\nhttps://claude.ai/api/organizations/{orgId}/overage_spend_limit\nhttps://claude.ai/api/organizations/{orgId}/members\nhttps://claude.ai/api/organizations/{orgId}/me\nhttps://claude.ai/api/organizations/{orgId}/billing\nhttps://claude.ai/api/me\nhttps://claude.ai/api/user\nhttps://claude.ai/api/session\nhttps://claude.ai/api/account\nhttps://claude.ai/settings/billing\nhttps://claude.ai/settings/account\nhttps://claude.ai/settings/usage\n```\n\n## Output Format\n\nFor each probed endpoint, the tool prints:\n\n```\n==> https://claude.ai/api/user\nstatus: 200\ncontent-type: application/json\nkeys: id, email, name, ...\nemails: user@example.com\nplan-hints: Team, Pro\nfields: created_at, updated_at, ...\npreview: {...}\n```\n\n### Output Fields\n\n| Field | Description |\n|-------|-------------|\n| `status` | HTTP status code, or `error` if the request failed |\n| `content-type` | Response Content-Type header (if present) |\n| `keys` | Top-level JSON keys in the response body |\n| `emails` | Email addresses found in the response |\n| `plan-hints` | Strings suggesting subscription plans (e.g., \"Team\", \"Pro\") |\n| `fields` | Notable fields identified in the response |\n| `preview` | Truncated raw body (only when `CLAUDE_WEB_PROBE_PREVIEW=1`) |\n\n## Architecture\n\n### Entry Point\n\nThe `@main` enum `CodexBarClaudeWebProbe` serves as the application entry point. The `main()` async function coordinates the probing workflow:\n\n1. Parses command-line arguments\n2. Checks the `CLAUDE_WEB_PROBE_PREVIEW` environment variable\n3. Calls `ClaudeWebAPIFetcher.probeEndpoints()` with the endpoint list\n4. Formats and prints each result\n\n### Key Dependencies\n\nThis module depends on types from **CodexBarCore**:\n\n- **`ClaudeWebAPIFetcher`** — Performs the actual HTTP requests and response analysis. Provides the `probeEndpoints()` method that returns `ProbeResult` objects.\n- **`BrowserDetection`** — Used for browser detection (passed with `cacheTTL: 0` to disable caching during probing).\n\n### Relationship to CodexBarCore\n\n```\nCodexBarClaudeWebProbe\n        │\n        ├── imports ──► CodexBarCore\n        │                    │\n        │                    ├── ClaudeWebAPIFetcher\n        │                    │       └── probeEndpoints()\n        │                    │\n        │                    └── BrowserDetection\n        │\n        └── @main enum (CLI entry point)\n```\n\nThe module is a consumer of CodexBarCore's API probing functionality. It provides a command-line wrapper around the core probing logic, making it easy to run ad-hoc endpoint surveys without writing additional code.\n\n## Exit Codes\n\n| Code | Description |\n|------|-------------|\n| `0` | All endpoints probed successfully (regardless of their HTTP status) |\n| `1` | An error occurred during probing (network failure, invalid URL, etc.) |\n\n## Example Workflow\n\nA typical use case is exploring API endpoints when developing integration with Claude.ai:\n\n```bash\n# Quick survey of accessible endpoints\n$ swift run CodexBarClaudeWebProbe\n\n==> https://claude.ai/api/user\nstatus: 200\ncontent-type: application/json\nkeys: id, email, name, avatar_url, created_at\n\n==> https://claude.ai/api/organizations\nstatus: 200\ncontent-type: application/json\nkeys: organizations\n\n...\n```\n\nThe results help developers understand which endpoints require authentication, what data they return, and how to structure API calls in downstream modules.","sources-codexbarcli":"# Sources — CodexBarCLI\n\n<think>\nLet me analyze this module to understand its purpose and structure.\n\nThe CodexBarCLI module is a command-line interface for the CodexBar application. It provides commands to:\n1. `usage` - Print usage from enabled providers (text or JSON)\n2. `cost` - Print local cost usage from Claude/Codex JSONL logs\n3. `config validate` - Validate config file\n4. `config dump` - Print normalized config JSON\n\nLet me identify the key components:\n\n1. **CLIEntry.swift** - Main entry point (`@main` enum) that handles command routing\n2. **CLIOptions.swift** - Command-line option definitions (UsageOptions, CostOptions, ConfigOptions)\n3. **CLIUsageCommand.swift** - Implementation of the `usage` command\n4. **CLICostCommand.swift** - Implementation of the `cost` command\n5. **CLIConfigCommand.swift** - Implementation of config commands\n6. **CLIErrorReporting.swift** - Error handling and JSON payloads\n7. **CLIHelpers.swift** - Various helper functions\n8. **CLIIO.swift** - I/O operations (stderr, version, help)\n9. **CLIExitCode.swift** - Exit codes\n10. **CLIOutputPreferences.swift** - Output format preferences\n11. **CLIPayloads.swift** - JSON payload structures\n12. **CLIRenderer.swift** - Text rendering for CLI output\n13. **TokenAccountCLI.swift** - Token account handling\n14. **CLIHelp.swift** - Help text strings\n\nThis is a well-structured CLI application. Let me write documentation that explains:\n- What the module does\n- The command structure\n- Key components\n- How to use it\n- Error handling\n- Output formats\n- How it connects to other modules (CodexBarCore)\n\nI should create a diagram showing the command structure and how things flow. A small diagram showing the main commands would be helpful.\n</think>\n\n# CodexBarCLI Module Documentation\n\nThe CodexBarCLI module implements the command-line interface for CodexBar, providing commands to query usage data, cost information, and manage configuration for multiple AI provider integrations.\n\n## Overview\n\nCodexBarCLI exposes four main commands through a unified CLI interface:\n\n- **`usage`** — Query usage data from enabled AI providers\n- **`cost`** — Display local token cost from Claude/Codex JSONL logs  \n- **`config validate`** — Validate the configuration file\n- **`config dump`** — Output normalized configuration as JSON\n\nThe CLI supports both text and JSON output formats, extensive filtering options, and handles provider-specific nuances (e.g., web vs CLI sources on macOS).\n\n## Command Architecture\n\n```mermaid\nflowchart TD\n    A[CodexBarCLI.main] --> B[Parse argv]\n    B --> C{Command}\n    C -->|usage| D[runUsage]\n    C -->|cost| E[runCost]\n    C -->|config validate| F[runConfigValidate]\n    C -->|config dump| G[runConfigDump]\n    \n    D --> H[UsageFetcher]\n    D --> I[TokenAccountCLIContext]\n    E --> J[CostUsageFetcher]\n    F --> K[CodexBarConfigValidator]\n    G --> K\n```\n\n## Key Components\n\n### Entry Point\n\n**`CLIEntry.swift`** — The `@main` enum containing `main()` which:\n1. Parses command-line arguments\n2. Resolves the command path (e.g., `[\"usage\"]` or `[\"config\", \"validate\"]`)\n3. Bootstraps logging based on flags\n4. Dispatches to the appropriate handler\n\n### Command Options\n\n| File | Command | Key Options |\n|------|---------|-------------|\n| `CLIOptions.swift` | `usage` | `--provider`, `--account`, `--source`, `--format`, `--status` |\n| `CLICostCommand.swift` | `cost` | `--provider`, `--refresh` |\n| `CLIConfigCommand.swift` | `config` | `--format`, `--pretty` |\n\nAll options are defined using the `Commander` library's `@Option` and `@Flag` property wrappers.\n\n### Output Rendering\n\n**`CLIRenderer.swift`** — Renders usage snapshots as formatted text with:\n- Progress bars showing remaining quota\n- Color-coded status indicators\n- Pace calculations for weekly usage\n- Reset time displays\n\n**`CLIOutputPreferences.swift`** — Encapsulates output preferences including format (text/json), JSON-only mode, and pretty-printing.\n\n### Error Handling\n\n**`CLIErrorReporting.swift`** — Provides consistent error handling:\n- `CLIErrorKind` categorizes errors (args, config, provider, runtime)\n- `ProviderErrorPayload` encodes errors in JSON responses\n- `mapError()` converts Swift errors to exit codes\n\n**`CLIExitCode.swift`** — Defines exit codes:\n- `0` — Success\n- `1` — General failure\n- `2` — Binary not found\n- `3` — Parse error\n- `4` — Timeout\n\n### Token Account Support\n\n**`TokenAccountCLI.swift`** — Handles multi-account scenarios:\n- Resolves accounts by label, index, or fetches all\n- Applies account context to API requests\n- Supports OAuth tokens for Claude\n\n## Usage Examples\n\n```bash\n# Default usage (text output)\ncodexbar\n\n# Specific provider in JSON\ncodexbar usage --provider claude --json --pretty\n\n# All providers with status\ncodexbar usage --provider all --status\n\n# Local cost only (no web required)\ncodexbar cost --provider claude\n\n# Validate config\ncodexbar config validate\n\n# Dump config as JSON\ncodexbar config dump --pretty\n```\n\n## Output Formats\n\n### Text Output\n\n```\n== Claude 1.0 (cli) ==\nToday: 78% ████████░░░░\nResets in 6h 23m\n\nLast 7 days: 45% █████░░░░░░\nPace: On pace | Expected 45% used\nResets in 6d\n```\n\n### JSON Output\n\n```json\n[\n  {\n    \"provider\": \"claude\",\n    \"account\": \"work@example.com\",\n    \"version\": \"1.0\",\n    \"source\": \"cli\",\n    \"status\": { \"indicator\": \"none\", \"description\": null },\n    \"usage\": { ... },\n    \"credits\": null,\n    \"error\": null\n  }\n]\n```\n\n## Provider Integration\n\nThe CLI integrates with multiple providers through the `ProviderDescriptorRegistry` and `ProviderFetchContext`. Key integration points:\n\n1. **Source Modes** — Providers support different fetch strategies: `cli`, `web`, `oauth`, `api`, `local`\n2. **Status Pages** — Fetches provider status from `api/v2/status.json` endpoints\n3. **Token Accounts** — Per-provider account resolution with environment injection\n\n## Configuration\n\nThe CLI loads configuration from `CodexBarConfigStore`:\n\n```swift\nlet config = Self.loadConfig(output: output)\n```\n\nIf loading fails, it exits with a JSON or text error depending on output preferences.\n\n## Dependencies\n\nThe module imports:\n- `CodexBarCore` — Core types and providers\n- `Commander` — CLI argument parsing","sources-codexbarcore":"# Sources — CodexBarCore\n\n<think>\nThe user wants me to write comprehensive documentation for the CodexBarCore module. Let me analyze the source code provided to understand what this module does.\n\nLooking at the files:\n\n1. **BrowserCookieAccessGate.swift** - A gate that controls access to browser cookies, particularly for Chromium-based browsers that require Keychain interaction. It implements a cooldown mechanism to suppress repeated prompts.\n\n2. **BrowserCookieImportOrder.swift** - Defines the order in which browsers should be attempted for cookie import and provides filtering methods.\n\n3. **BrowserDetection.swift** - Detects whether browsers are installed and has usable profile data. Uses caching to avoid repeated file system checks.\n\n4. **CodexBarConfig.swift** - Configuration model for CodexBar, including provider configurations.\n\n5. **CodexBarConfigStore.swift** - Handles loading/saving configuration to disk with secure permissions.\n\n6. **CodexBarConfigValidation.swift** - Validates configuration and reports issues.\n\n7. **ProviderConfigEnvironment.swift** - Applies environment variable overrides for API keys based on provider config.\n\n8. **CookieHeaderCache.swift** - Caches cookie headers in the keychain for providers.\n\n9. **CookieHeaderNormalizer.swift** - Normalizes raw cookie header strings into a standard format.\n\n10. **CopilotUsageModels.swift** - Models for Copilot usage/quota responses.\n\n11. **CostUsageFetcher.swift** - Fetches cost/usage data for supported providers.\n\n12. **CostUsageModels.swift** - Data models for cost/usage reports (daily, session, monthly).\n\n13. **CreditsModels.swift** - Models for credit events and snapshots.\n\n14. **TTYCommandRunner.swift** - Executes CLI commands in a pseudo-terminal, handling interactive flows like Codex/Claude status.\n \nThe module also includes **SubprocessRunner.swift** for running subprocesses with proper environment handling, **KeychainAccessGate.swift** to globally enable/disable keychain access, **KeychainAccessPreflight.swift** for checking keychain access without triggering UI, and **KeychainCacheStore.swift** for storing encoded data in the keychain. Additional utilities handle keychain queries without UI prompts in **KeychainNoUIQuery.swift**, logging infrastructure via **CodexBarLog.swift**, and various support types. The overall architecture centers on managing browser cookie imports, handling authentication flows across multiple providers, storing sensitive data securely in the keychain, and providing usage tracking and cost reporting capabilities.\n\nI'll organize the documentation to cover the module's purpose and scope, detail the key components, explain how each piece fits together, document the public API surface, and clarify the dependencies and integration points.\n</think>\n\n# CodexBarCore Module Documentation\n\nThe **CodexBarCore** module provides the foundational infrastructure for CodexBar — a macOS utility that bridges multiple AI assistant integrations (Claude, Codex, Copilot, etc.) by managing authentication, browser cookie imports, configuration, and usage tracking.\n\n## Overview\n\nCodexBarCore addresses a fundamental challenge: many AI providers store session cookies in browser profiles that require OS-level keychain access to decrypt. This module provides:\n\n1. **Browser Integration** — Detection, cookie extraction, and access gating for browser profiles\n2. **Secure Storage** — Keychain-based caching for sensitive data (cookies, OAuth tokens)\n3. **Configuration Management** — Persistent configuration with validation\n4. **Usage Tracking** — Cost and token usage fetching from provider APIs\n5. **Process Execution** — TTY and subprocess runners for CLI interactions\n6. **Logging** — Structured logging with multiple output destinations\n\n## Architecture\n\n```mermaid\ngraph TB\n    subgraph \"CodexBarCore\"\n        Config[Config System]\n        Browser[Browser Integration]\n        Keychain[Keychain Services]\n        Usage[Usage Tracking]\n        Process[Process Execution]\n        Logging[Logging]\n    end\n    \n    Config -->|Reads/Writes| Browser\n    Config --> Keychain\n    Browser -->|Cookie Cache| Keychain\n    Usage -->|Token Snapshots| Keychain\n    Process -->|CLI Execution| Logging\nend\n```\n\n---\n\n## Browser Integration\n\n### BrowserDetection\n\n`BrowserDetection` determines which browsers are installed and whether they have usable profile data. It uses caching (default 10-minute TTL) to avoid repeated filesystem probes.\n\n**Key methods:**\n\n```swift\npublic func isAppInstalled(_ browser: Browser) -> Bool\npublic func isCookieSourceAvailable(_ browser: Browser) -> Bool\npublic func hasUsableProfileData(_ browser: Browser) -> Bool\npublic func clearCache()\n```\n\nThe class is designed to avoid triggering unnecessary Keychain prompts. For Chromium-based browsers, `isCookieSourceAvailable` checks for actual cookie store files before allowing an import attempt.\n\n### BrowserCookieAccessGate\n\n`BrowserCookieAccessGate` implements a cooldown mechanism for browsers that require Keychain interaction. When a user denies a keychain prompt, subsequent attempts are suppressed for 6 hours per browser.\n\n**Key methods:**\n\n```swift\npublic static func shouldAttempt(_ browser: Browser, now: Date = Date()) -> Bool\npublic static func recordIfNeeded(_ error: Error, now: Date = Date())\npublic static func recordDenied(for browser: Browser, now: Date = Date())\npublic static func resetForTesting()\n```\n\nThe gate uses `OSAllocatedUnfairLock` for thread-safe state management and persists blocked-until timestamps to `UserDefaults`.\n\n### BrowserCookieImportOrder\n\nProvides filtering extensions on `[Browser]`:\n\n```swift\nfunc cookieImportCandidates(using detection: BrowserDetection) -> [Browser]\nfunc browsersWithProfileData(using detection: BrowserDetection) -> [Browser]\n```\n\n---\n\n## Keychain Services\n\nCodexBarCore provides a layered keychain abstraction:\n\n| Component | Purpose |\n|-----------|---------|\n| `KeychainAccessGate` | Global on/off switch for keychain access (debug/testing) |\n| `KeychainAccessPreflight` | Check keychain availability without triggering UI |\n| `KeychainCacheStore` | Read/write codable entries to keychain |\n| `KeychainNoUIQuery` | Configure queries to avoid prompts |\n| `KeychainPromptHandler` | Notify when a prompt is required |\n\n### KeychainAccessPreflight\n\nBefore attempting to decrypt browser cookies, CodexBar checks if the keychain item requires user interaction:\n\n```swift\npublic static func checkGenericPassword(service: String, account: String?) -> Outcome\n// Returns: .allowed, .interactionRequired, .notFound, .failure(Int)\n```\n\nThis uses `kSecUseAuthenticationUIFail` to avoid triggering the legacy keychain prompt on macOS.\n\n### KeychainCacheStore\n\nStores codable data in the keychain with a consistent schema:\n\n```swift\npublic static func load<Entry: Codable>(key: Key, as: Entry.Type) -> LoadResult<Entry>\npublic static func store(key: Key, entry: some Codable)\npublic static func clear(key: Key)\n```\n\nKeys are constructed with category and identifier:\n\n```swift\nKeychainCacheStore.Key.cookie(provider: .claude)\nKeychainCacheStore.Key.oauth(provider: .copilot)\n```\n\n---\n\n## Cookie Management\n\n### CookieHeaderCache\n\nCaches normalized cookie headers per provider in the keychain:\n\n```swift\npublic static func load(provider: UsageProvider) -> Entry?\npublic static func store(provider: UsageProvider, cookieHeader: String, sourceLabel: String, now: Date = Date())\npublic static func clear(provider: UsageProvider)\n```\n\nIncludes migration from legacy file-based storage.\n\n### CookieHeaderNormalizer\n\nParses various raw cookie header formats into a canonical `name=value; name=value` form:\n\n```swift\npublic static func normalize(_ raw: String?) -> String?\npublic static func pairs(from raw: String) -> [(name: String, value: String)]\n```\n\nHandles patterns like:\n- `-H 'Cookie: ...'`\n- `--cookie \"...\"`\n- Raw `Cookie: ...` headers\n\n---\n\n## Configuration System\n\n### CodexBarConfig\n\nThe main configuration model:\n\n```swift\npublic struct CodexBarConfig: Codable {\n    public var version: Int\n    public var providers: [ProviderConfig]\n}\n```\n\n### CodexBarConfigStore\n\nPersists config to `~/.codexbar/config.json` with secure permissions (`0o600`):\n\n```swift\npublic func load() throws -> CodexBarConfig?\npublic func loadOrCreateDefault() throws -> CodexBarConfig\npublic func save(_ config: CodexBarConfig) throws\npublic func deleteIfPresent() throws\n```\n\n### CodexBarConfigValidation\n\nValidates configuration and returns issues:\n\n```swift\npublic static func validate(_ config: CodexBarConfig) -> [CodexBarConfigIssue]\n```\n\nChecks include:\n- Config version compatibility\n- Source mode support per provider\n- Required fields (API keys, regions)\n- Provider-specific region validation (MiniMax, Zai)\n\n### ProviderConfigEnvironment\n\nApplies API key overrides to process environment:\n\n```swift\npublic static func applyAPIKeyOverride(\n    base: [String: String],\n    provider: UsageProvider,\n    config: ProviderConfig?) -> [String: String]\n```\n\n---\n\n## Usage Tracking\n\n### CostUsageModels\n\nDefines data structures for usage reports:\n\n- `CostUsageDailyReport` — Per-day breakdown with token counts and costs\n- `CostUsageSessionReport` — Session-based aggregation\n- `CostUsageMonthlyReport` — Monthly summaries\n\nAll support multiple JSON schemas (current and legacy formats) through flexible decoding.\n\n### CostUsageFetcher\n\nFetches usage data from supported providers:\n\n```swift\npublic func loadTokenSnapshot(\n    provider: UsageProvider,\n    now: Date = Date(),\n    forceRefresh: Bool = false,\n    allowVertexClaudeFallback: Bool = false) async throws -> CostUsageTokenSnapshot\n```\n\nSupports Codex, Claude, and Vertex AI. Includes fallback logic for Vertex AI when Claude logs are present.\n\n### CopilotUsageModels\n\nDedicated model for GitHub Copilot quota responses.\n\n### CreditsModels\n\nTracks credit-based services with event history:\n\n```swift\npublic struct CreditEvent: Identifiable, Equatable, Codable\npublic struct CreditsSnapshot: Equatable, Codable\n```\n\n---\n\n## Process Execution\n\n### TTYCommandRunner\n\nExecutes CLI commands in a pseudo-terminal, capturing interactive output. Used for Codex and Claude CLI status commands.\n\n**Key features:**\n- PTY-based execution with configurable rows/columns\n- Support for Codex-specific flows (update prompts, status parsing)\n- Configurable timeouts and idle detection\n- Process group isolation for clean termination\n- Cursor position queries for terminal state\n\n```swift\npublic func run(\n    binary: String,\n    send script: String,\n    options: Options = Options(),\n    onURLDetected: (@Sendable () -> Void)? = nil) throws -> Result\n```\n\n### SubprocessRunner\n\nNon-interactive subprocess execution with proper environment handling:\n\n```swift\npublic static func run(\n    binary: String,\n    arguments: [String],\n    environment: [String: String],\n    timeout: TimeInterval,\n    label: String) async throws -> SubprocessResult\n```\n\n---\n\n## Logging\n\n### CodexBarLog\n\nStructured logging with multiple destinations:\n\n```swift\npublic enum Level: String {\n    case trace, verbose, debug, info, warning, error, critical\n}\n\npublic static func bootstrapIfNeeded(_ config: Configuration)\npublic static func logger(_ category: String) -> CodexBarLogger\n```\n\nFeatures:\n- Composite handlers (stderr/oslog + file)\n- JSON output option\n- Automatic redaction of sensitive data\n- Per-category loggers with consistent metadata\n\n---\n\n## Platform Support\n\nSeveral components have conditional compilation:\n\n- **macOS**: Full functionality including keychain, browser detection, PTY execution\n- **Other platforms**: Stub implementations that return empty results or pass-through values\n\nExample from `BrowserCookieAccessGate`:\n```swift\n#if os(macOS)\nimport os.lock\nimport SweetCookieKit\n// Full implementation\n#else\n// Stub that always returns true/empty\n#endif\n```\n\n---\n\n## Testing Infrastructure\n\nThe module includes testing hooks:\n\n- `@TaskLocal` overrides for keychain access (`KeychainAccessGate`)\n- Test store overrides (`KeychainCacheStore`)\n- Handler injection for keychain prompts (`KeychainPromptHandler`)\n- Preflight overrides (`KeychainAccessPreflight`)\n\nThese enable isolated unit tests without requiring actual keychain access.\n\n---\n\n## Integration Points\n\nCodexBarCore integrates with:\n\n- **SweetCookieKit** — Browser cookie extraction (macOS)\n- **Swift Logging** — Log handler infrastructure\n- **LocalAuthentication** — Keychain context configuration\n- **Foundation** — FileManager, Process, UserDefaults","sources-codexbarmacros":"# Sources — CodexBarMacros\n\n<think>\nLet me analyze this module carefully to understand what it does and how to document it.\n\n## Understanding the Module\n\nThis is a Swift Macro plugin module called `CodexBarMacros`. It provides three macros:\n\n1. **ProviderDescriptorRegistrationMacro** - A `PeerMacro` that registers a provider descriptor with the registry\n2. **ProviderDescriptorDefinitionMacro** - A `MemberMacro` that generates a static `descriptor` property\n3. **ProviderImplementationRegistrationMacro** - A `PeerMacro` that registers a provider implementation\n\n### Key Components:\n\n1. **ProviderMacroError** - Contains error definitions and diagnostic helpers for various validation errors\n2. **ProviderMacroIntrospection** - Contains helper functions to inspect type declarations\n3. **The three macro implementations**\n4. **CodexBarMacroPlugin** - The main plugin entry point\n\n### The Macros:\n\n**@ProviderDescriptorRegistration** (PeerMacro)\n- Must be attached to a struct, class, or enum\n- Requires either `static let descriptor` or `static func makeDescriptor()` to exist\n- Generates code that registers the descriptor with `ProviderDescriptorRegistry.register()`\n\n**@ProviderDescriptorDefinition** (MemberMacro)\n- Must be attached to a struct, class, or enum\n- Requires `static func makeDescriptor()` to exist\n- Generates `public static let descriptor: ProviderDescriptor = Self.makeDescriptor()`\n- Errors if `static let descriptor` already exists\n\n**@ProviderImplementationRegistration** (PeerMacro)\n- Must be attached to a struct, class, or enum\n- Requires an accessible init() (either explicit or synthesizable)\n- Generates code that registers the type with `ProviderImplementationRegistry.register()`\n\n### Execution Flow:\n\nWhen a developer uses these macros:\n\n\n1. The compiler invokes the macro expansion\n2. The macro inspects the declaration it's attached to\n3. Validation runs to ensure requirements are met\n4. Either peer declarations or new member declarations get generated\n5. If validation fails, the macro emits diagnostic errors and returns empty\n\n### Architecture:\n\nThe macros follow a validation-first pattern where they validate requirements before generating any code. The introspection utilities allow each macro to examine the declaration it processes, and peer macros generate declarations alongside the original one while member macros add new members to the type.\n\nNow I should document how developers use these macros in practice, starting with examples like defining a provider type with a descriptor and implementation, then showing how the macros transform that into registered code.\n</think>\n\n# CodexBarMacros\n\nA Swift macro plugin that provides three attribute macros for registering providers and their descriptors with the CodexBar dependency injection system.\n\n## Overview\n\nThis module defines Swift macros that automate the registration of provider types with the CodexBar dependency injection framework. Instead of manually writing registration boilerplate, you can attach attributes to your types and let the macros generate the appropriate registration code at compile time.\n\nThe macros handle three aspects of provider registration:\n\n1. **Descriptor Registration** — Registers a type's `ProviderDescriptor` with the global registry\n2. **Descriptor Definition** — Generates a `static let descriptor` property from a `makeDescriptor()` method\n3. **Implementation Registration** — Registers a type as a concrete implementation provider\n\n## Macros\n\n### @ProviderDescriptorDefinition\n\nA **MemberMacro** that generates a static `descriptor` property for types that implement `makeDescriptor()`.\n\n```swift\n@ProviderDescriptorDefinition\nstruct MyProvider {\n    static func makeDescriptor() -> ProviderDescriptor {\n        ProviderDescriptor(name: \"MyProvider\", ...)\n    }\n}\n```\n\nExpands to:\n\n```swift\nstruct MyProvider {\n    public static let descriptor: ProviderDescriptor = Self.makeDescriptor()\n}\n```\n\n**Requirements:**\n- Must be attached to a `struct`, `class`, or `enum`\n- The type must declare a static `makeDescriptor()` method\n\n---\n\n### @ProviderDescriptorRegistration\n\nA **PeerMacro** that registers the type's descriptor with `ProviderDescriptorRegistry`.\n\n```swift\n@ProviderDescriptorRegistration\n@ProviderDescriptorDefinition\nstruct MyProvider {\n    static func makeDescriptor() -> ProviderDescriptor { ... }\n}\n```\n\nExpands to add a private property that performs registration:\n\n```swift\nprivate let _CodexBarDescriptorRegistration_MyProvider = \n    ProviderDescriptorRegistry.register(MyProvider.descriptor)\n```\n\n**Requirements:**\n- Must be attached to a `struct`, `class`, or `enum`\n- The type must have either `static let descriptor` or `static func makeDescriptor()`\n\n---\n\n### @ProviderImplementationRegistration\n\nA **PeerMacro** that registers the type as a concrete implementation provider.\n\n```swift\n@ProviderImplementationRegistration\nstruct DatabaseProvider: Provider {\n    let connectionString: String\n    \n    init(connectionString: String = \"default\") {\n        self.connectionString = connectionString\n    }\n}\n```\n\nExpands to:\n\n```swift\nprivate let _CodexBarImplementationRegistration_DatabaseProvider = \n    ProviderImplementationRegistry.register(DatabaseProvider())\n```\n\n**Requirements:**\n- Must be attached to a `struct`, `class`, or `enum`\n- The type must have an accessible initializer (either explicit with no arguments, or synthesizable with all properties having default values)\n\n---\n\n## Combined Usage\n\nThe macros are typically used together:\n\n```swift\n@ProviderDescriptorRegistration\n@ProviderDescriptorDefinition\nfinal class UserServiceProvider: Provider {\n    typealias Dependency = UserRepository & Logger\n    \n    private let repository: UserRepository\n    private let logger: Logger\n    \n    init(repository: UserRepository, logger: Logger) {\n        self.repository = repository\n        self.logger = logger\n    }\n    \n    static func makeDescriptor() -> ProviderDescriptor {\n        ProviderDescriptor(\n            name: \"UserService\",\n            dependencyType: (UserRepository.self, Logger.self),\n            factory: { UserServiceProvider(repository: $0, logger: $1) }\n        )\n    }\n}\n\n@ProviderImplementationRegistration\nfinal class DefaultUserRepository: UserRepository { ... }\n```\n\n## Internal Components\n\n### ProviderMacroError\n\nDefines compile-time error messages for common misuse scenarios:\n\n| Error | Cause |\n|-------|-------|\n| `unsupported_target` | Macro attached to something other than struct/class/enum |\n| `missing_descriptor` | `@ProviderDescriptorRegistration` on type without descriptor |\n| `missing_make_descriptor` | `@ProviderDescriptorDefinition` on type without `makeDescriptor()` |\n| `duplicate_descriptor` | `@ProviderDescriptorDefinition` on type that already has `static let descriptor` |\n| `missing_init` | `@ProviderImplementationRegistration` on type without accessible init |\n\n### ProviderMacroIntrospection\n\nHelper functions that inspect type declarations to determine:\n\n- Whether a type declares `static let descriptor`\n- Whether a type declares `static func makeDescriptor()`\n- Whether a type has an accessible zero-argument initializer\n- Whether a struct/class can have a default initializer synthesized\n\n## Architecture\n\n```mermaid\nflowchart TD\n    subgraph Macros\n        PD[ProviderDescriptorDefinitionMacro]\n        PR[ProviderDescriptorRegistrationMacro]\n        PI[ProviderImplementationRegistrationMacro]\n    end\n    \n    subgraph Introspection\n        TI[ProviderMacroIntrospection]\n        TE[ProviderMacroError]\n    end\n    \n    PD -->|validates via| TI\n    PR -->|validates via| TI\n    PI -->|validates via| TI\n    \n    PD -->|emits errors via| TE\n    PR -->|emits errors via| TE\n    PI -->|emits errors via| TE\n    \n    PD -->|\"adds member\"| Decl[Generated: static let descriptor]\n    PR -->|\"adds peer\"| Reg1[ProviderDescriptorRegistry.register]\n    PI -->|\"adds peer\"| Reg2[ProviderImplementationRegistry.register]\n```\n\n## Error Handling\n\nWhen macros encounter invalid usage, they emit Swift compiler diagnostics and return empty expansions. This means:\n\n- Invalid macro applications produce compile errors, not silent failures\n- The original code remains unchanged when errors occur\n- Multiple errors can be reported if applicable\n\nFor example, applying `@ProviderDescriptorRegistration` to a protocol:\n\n```swift\n@ProviderDescriptorRegistration\nprotocol MyProvider { }  // Error: @ProviderDescriptorRegistration must be attached to a struct, class, or enum.\n```","sources-codexbarmacrosupport":"# Sources — CodexBarMacroSupport\n\n<think>\nThe user wants me to write documentation for the \"Sources — CodexBarMacroSupport\" module. Let me analyze what I have:\n\n1. The source code is essentially a stub/placeholder file\n2. There's a comment explaining this is for Swift 5.7 compatibility\n3. The call graph shows no internal, outgoing, or incoming calls\n4. No execution flows detected\n\nThis is clearly a placeholder module that exists for future use or compatibility. The comment mentions:\n- These were macro implementations (stubs)\n- In Swift 5.7, they're no longer needed manually because descriptors are hardcoded in ProviderDescriptorRegistry\n\nI should write documentation that:\n1. Explains this is a placeholder/stub module\n2. Explains the historical context (why it exists)\n3. Explains the relationship to Swift 5.7 and ProviderDescriptorRegistry\n4. Notes that this is currently unused but kept for future use\n\nI should NOT include a Mermaid diagram here since there's no meaningful architecture to show - no connections, no flows, no components that interact.\n\nLet me structure this as:\n1. Overview/Purpose - explaining what this module is\n2. Background - the context about macros in Swift\n3. Current Status - explain it's a stub/placeholder\n4. Relationship to other components - mention ProviderDescriptorRegistry\n5. Future Considerations - what might happen here\n\nI need to be honest about what this module is - it's essentially empty/placeholder code.\n</think>\n\n# CodexBarMacroSupport Module\n\n## Overview\n\nThe **CodexBarMacroSupport** module serves as a placeholder for macro-related functionality within the CodexBar system. It currently contains minimal stub code and is maintained for potential future use and backward compatibility.\n\n## Purpose\n\nThis module was originally created to house macro implementations for the CodexBar provider system. The macros were intended to simplify provider registration and descriptor management through Swift's macro system.\n\n## Current Status\n\nThe module currently contains only a placeholder enum:\n\n```swift\npublic enum CodexBarMacros {\n    // 这些是保留给未来使用的占位符\n}\n```\n\n### Why It's Empty\n\nThe implementation is intentionally minimal because:\n\n1. **Swift 5.7 Compatibility**: In Swift 5.7, the macro descriptors are no longer required to be manually added. Instead, they are hardcoded directly in the `ProviderDescriptorRegistry`.\n\n2. **No Active Dependencies**: The call graph analysis confirms there are no incoming or outgoing calls to this module. It is not currently referenced by any other part of the codebase.\n\n## Relationship to ProviderDescriptorRegistry\n\nWhile there is no direct code-level connection in the current implementation, this module historically existed in conjunction with `ProviderDescriptorRegistry`. The comment in the source code indicates:\n\n> these macros in Swift 5.7 no longer need to be manually added because the descriptor is already hardcoded in ProviderDescriptorRegistry\n\nThis suggests that if macro support is needed in the future, the implementation would need to coordinate with `ProviderDescriptorRegistry` to ensure descriptors are properly registered.\n\n## Future Considerations\n\nThis module remains in the codebase as:\n\n- **A Reserved Namespace**: The `CodexBarMacros` enum reserves the macro namespace for potential future implementation\n- **A Historical Reference**: It documents the architectural decision to move macro descriptors into `ProviderDescriptorRegistry`\n- **A Compatibility Marker**: It signals that the codebase has been updated for Swift 5.7 compatibility\n\nIf future development requires adding macro support, developers should:\n\n1. Examine the current `ProviderDescriptorRegistry` implementation\n2. Determine if macros can be added without breaking the hardcoded descriptor approach\n3. Implement the appropriate macro types within the `CodexBarMacros` enum\n\n## Summary\n\nThe CodexBarMacroSupport module is currently a no-op placeholder. It represents an architectural decision to use hardcoded descriptors in `ProviderDescriptorRegistry` rather than Swift macros, simplifying the codebase for Swift 5.7 compatibility. The module is kept for potential future use rather than removal, preserving the option to reintroduce macro-based functionality if needed.","sources-codexbarwidget":"# Sources — CodexBarWidget\n\n<think>\nLet me analyze this module to understand its purpose and structure.\n\nThis is a SwiftUI Widget module for the CodexBar app. It provides various home screen widgets that display AI provider usage information. Let me break down what I see:\n\n1. **CodexBarWidgetBundle.swift** - The main entry point that bundles 4 different widgets:\n   - CodexBarSwitcherWidget - Allows switching between providers\n   - CodexBarUsageWidget - Shows session and weekly usage with credits/costs\n   - CodexBarHistoryWidget - Shows usage history chart\n   - CodexBarCompactWidget - Small widget for single metrics\n\n2. **CodexBarWidgetProvider.swift** - Contains:\n   - ProviderChoice enum - Maps UsageProvider to widget-friendly selection\n   - CompactMetric enum - Metrics for the compact widget\n   - AppIntents for configuration (ProviderSelectionIntent, SwitchWidgetProviderIntent, CompactMetricSelectionIntent)\n   - Timeline providers (CodexBarTimelineProvider, CodexBarSwitcherTimelineProvider, CodexBarCompactTimelineProvider)\n   - Entry types (CodexBarWidgetEntry, CodexBarCompactEntry, CodexBarSwitcherEntry)\n   - WidgetPreviewData for placeholder content\n\n3. **CodexBarWidgetViews.swift** - Contains all the SwiftUI views for the widgets:\n   - Main widget views (CodexBarUsageWidgetView, CodexBarHistoryWidgetView, etc.)\n   - Various sub-views (CompactMetricView, ProviderSwitcherRow, etc.)\n   - Chart views (UsageHistoryChart)\n   - Helper views (HeaderView, UsageBarRow, ValueLine)\n   - WidgetColors and WidgetFormat enums for styling and formatting\n\nThe module depends on:\n- SwiftUI\n- WidgetKit\n- AppIntents\n- CodexBarCore (external module with UsageProvider, WidgetSnapshot, etc.)\n\n\n- Widgets pull usage data from WidgetSnapshotStore and persist provider selections through WidgetSelectionStore, with refresh intervals set at 30 minutes. I'll organize the documentation to cover the module's purpose, the four widget types, the provider system, configuration intents, and data flow.\n</think>\n\n# CodexBarWidget Module\n\nThe CodexBarWidget module provides iOS home screen widgets that display AI provider usage statistics. Users can monitor their session usage, weekly limits, credits, costs, and usage history directly from the home screen without opening the app.\n\n## Overview\n\nThis module implements four distinct widget types through WidgetKit, each designed for different display sizes and information needs. The widgets read usage data from a shared snapshot stored by the main app and display real-time (or near-real-time) information about AI provider consumption.\n\nThe module depends on **CodexBarCore**, which provides:\n- `UsageProvider` — the enumeration of supported AI providers\n- `WidgetSnapshot` — the data structure containing usage information\n- `ProviderDefaults` — metadata (display names, labels) for each provider\n\n```mermaid\nflowchart TB\n    subgraph Widgets[\"CodexBarWidgetBundle\"]\n        W1[\"CodexBarSwitcherWidget\"]\n        W2[\"CodexBarUsageWidget\"]\n        W3[\"CodexBarHistoryWidget\"]\n        W4[\"CodexBarCompactWidget\"]\n    end\n    \n    subgraph Providers[\"Timeline Providers\"]\n        P1[\"CodexBarSwitcherTimelineProvider\"]\n        P2[\"CodexBarTimelineProvider\"]\n        P3[\"CodexBarCompactTimelineProvider\"]\n    end\n    \n    subgraph Intents[\"AppIntents\"]\n        I1[\"ProviderSelectionIntent\"]\n        I2[\"SwitchWidgetProviderIntent\"]\n        I3[\"CompactMetricSelectionIntent\"]\n    end\n    \n    subgraph Views[\"Widget Views\"]\n        V1[\"CodexBarSwitcherWidgetView\"]\n        V2[\"CodexBarUsageWidgetView\"]\n        V3[\"CodexBarHistoryWidgetView\"]\n        V4[\"CodexBarCompactWidgetView\"]\n    end\n    \n    subgraph Data[\"Data Sources\"]\n        DS1[\"WidgetSnapshotStore\"]\n        DS2[\"WidgetSelectionStore\"]\n    end\n    \n    W1 --> P1\n    W2 --> P2\n    W3 --> P2\n    W4 --> P3\n    \n    V1 --> I2\n    P1 --> V1\n    P2 --> V2\n    P2 --> V3\n    P3 --> V4\n    \n    P1 --> DS2\n    P2 --> DS1\n    P3 --> DS1\n```\n\n## Widget Types\n\n### CodexBarSwitcherWidget\nThe switcher widget allows users to toggle between multiple AI providers directly from the home screen. It displays usage bars for the selected provider and includes interactive chips to switch providers.\n\n- **Families**: `.systemSmall`, `.systemMedium`, `.systemLarge`\n- **Configuration**: Static (no user intent on initial add)\n- **Interactive**: Uses `SwitchWidgetProviderIntent` to change the active provider\n\n### CodexBarUsageWidget\nThe primary usage widget displays session and weekly usage bars, remaining credits, and token costs.\n\n- **Families**: `.systemSmall`, `.systemMedium`, `.systemLarge`\n- **Configuration**: `ProviderSelectionIntent` — user selects a provider when adding the widget\n- **Data**: Primary rate window, secondary (weekly) rate window, credits remaining, token usage summary\n\n### CodexBarHistoryWidget\nShows a 7-day usage history chart with today's and 30-day totals.\n\n- **Families**: `.systemMedium`, `.systemLarge`\n- **Configuration**: `ProviderSelectionIntent`\n- **Data**: Daily usage points array, session and 30-day cost/token summaries\n\n### CodexBarCompactWidget\nA minimal widget for systemSmall family that displays a single metric: credits left, today's cost, or 30-day cost.\n\n- **Family**: `.systemSmall` only\n- **Configuration**: `CompactMetricSelectionIntent` — user selects both provider and metric\n\n## Provider System\n\n### ProviderChoice Enum\n\n`ProviderChoice` bridges between the app's `UsageProvider` enum and the widget configuration system. It conforms to `AppEnum` to enable picker UI in widget configuration.\n\n```swift\nenum ProviderChoice: String, AppEnum {\n    case codex, claude, gemini, antigravity, zai, copilot, minimax, opencode\n    // ...\n}\n```\n\n**Key behavior**: The enum filters which providers are available in widgets. Several providers from `UsageProvider` return `nil` from the initializer because they aren't yet supported in widgets:\n\n- `cursor`, `factory`, `vertexai`, `kiro`, `augment`, `jetbrains`, `kimi`, `kimik2`, `amp`, `ollama`, `synthetic`, `openrouter`, `warp`\n\nThe `availableProviders(from:)` method in `CodexBarSwitcherTimelineProvider` filters the snapshot's enabled providers to only those with a corresponding `ProviderChoice`.\n\n### CompactMetric Enum\n\nDefines the three metrics available in the compact widget:\n\n- `.credits` — remaining credits\n- `.todayCost` — current session cost in USD\n- `.last30DaysCost` — rolling 30-day cost\n\n## Timeline Providers\n\nEach widget type has a corresponding timeline provider that creates timeline entries. All providers follow the same refresh policy: `.after(30 minutes)`.\n\n### CodexBarTimelineProvider\nUsed by both `CodexBarUsageWidget` and `CodexBarHistoryWidget`. Implements `AppIntentTimelineProvider` to receive the `ProviderSelectionIntent` configuration.\n\n### CodexBarSwitcherTimelineProvider\nA `TimelineProvider` (non-AppIntent) because the switcher widget stores its selected provider separately via `WidgetSelectionStore`. This allows the widget to remain interactive without reconfiguration.\n\n### CodexBarCompactTimelineProvider\nAnother `AppIntentTimelineProvider`, receiving both provider and metric selection from `CompactMetricSelectionIntent`.\n\n## Data Flow\n\n### Reading Usage Data\n\n```swift\nlet snapshot = WidgetSnapshotStore.load() ?? WidgetPreviewData.snapshot()\n```\n\nAll timeline providers load `WidgetSnapshot` from `WidgetSnapshotStore`. This snapshot is written by the main CodexBar app when it refreshes usage data. If no snapshot exists (widget added before first app launch), preview data provides placeholder values.\n\n### Storing Provider Selection\n\nThe switcher widget uses `WidgetSelectionStore` to persist the user's chosen provider:\n\n```swift\nWidgetSelectionStore.saveSelectedProvider(self.provider.provider)\n// Later, when building the timeline:\nlet stored = WidgetSelectionStore.loadSelectedProvider()\n```\n\n### Interactive Provider Switching\n\nWhen a user taps a provider chip in the switcher widget, `SwitchWidgetProviderIntent` executes:\n\n```swift\nfunc perform() async throws -> some IntentResult {\n    WidgetSelectionStore.saveSelectedProvider(self.provider.provider)\n    WidgetCenter.shared.reloadAllTimelines()\n    return .result()\n}\n```\n\nThis saves the selection and triggers an immediate widget refresh.\n\n## Widget Views\n\nThe views in `CodexBarWidgetViews.swift` follow a consistent pattern:\n\n1. **Extract provider entry** from snapshot based on the selected provider\n2. **Choose layout** based on `@Environment(\\.widgetFamily)` \n3. **Render content** or show empty state if no data available\n\n### View Hierarchy\n\n```\nCodexBarUsageWidgetView\n├── SmallUsageView\n├── MediumUsageView\n└── LargeUsageView\n\nCodexBarHistoryWidgetView\n└── HistoryView (adapts to size)\n\nCodexBarCompactWidgetView\n└── CompactMetricView\n\nCodexBarSwitcherWidgetView\n├── ProviderSwitcherRow\n│   └── ProviderSwitchChip (interactive)\n├── SwitcherSmallUsageView\n├── SwitcherMediumUsageView\n└── SwitcherLargeUsageView\n```\n\n### Shared Components\n\n- **HeaderView** — Provider name and relative timestamp\n- **UsageBarRow** — Horizontal progress bar with percentage\n- **ValueLine** — Label + value pair\n- **UsageHistoryChart** — 7-day bar chart\n- **WidgetColors** — Provider-specific brand colors\n- **WidgetFormat** — Formatting helpers for currency, percentages, token counts\n\n## Customization\n\n### Widget Colors\n\n`WidgetColors` maps each `UsageProvider` to a brand-appropriate `Color`. These colors are used for:\n- Usage bar fills\n- History chart bars\n- Chip backgrounds when selected\n\n### Widget Preview Data\n\n`WidgetPreviewData` provides hardcoded sample data for:\n- Placeholder view (shown during widget gallery browsing)\n- Fallback when no real snapshot exists\n\nThe preview data includes realistic values: 35% session usage, 60% weekly usage, 1,243.4 credits, and a week's worth of daily usage points.\n\n## Configuration Display Strings\n\nEach widget declares its configuration intent through `configurationDisplayName` and `description`:\n\n| Widget | Display Name | Description |\n|--------|--------------|-------------|\n| Switcher | \"CodexBar Switcher\" | \"Usage widget with a provider switcher.\" |\n| Usage | \"CodexBar Usage\" | \"Session and weekly usage with credits and costs.\" |\n| History | \"CodexBar History\" | \"Usage history chart with recent totals.\" |\n| Compact | \"CodexBar Metric\" | \"Compact widget for credits or cost.\" |\n\n## Integration Notes\n\nWhen adding this module to a project:\n\n1. **WidgetSnapshotStore** must be implemented in the main app (or a shared framework) to provide usage data\n2. **WidgetSelectionStore** must persist the selected provider (UserDefaults is typical)\n3. The widget bundle must be registered in the app's target\n4. The main app should write to `WidgetSnapshotStore` periodically so widgets have fresh data","sources":"# Sources\n\n<think>\nThe user wants me to write documentation for the \"Sources\" module, which contains multiple sub-modules. Let me analyze what each sub-module does and then synthesize how they work together.\n\nBased on the analysis provided:\n\n1. **CodexBar** - Main macOS menu bar application\n2. **CodexBarCLI** - Command-line interface for usage/cost queries\n3. **CodexBarClaudeWatchdog** - Process supervisor that monitors Claude CLI\n4. **CodexBarClaudeWebProbe** - Network probe to test Claude.ai API endpoints\n5. **CodexBarCore** - Shared utilities: browser cookie handling, config, keychain, notifications\n6. **CodexBarMacroSupport** - Placeholder module (historical)\n7. **CodexBarMacros** - Swift macros for provider descriptor registration\n8. **CodexBarWidget** - macOS widgets for usage display\n\nLet me write a summary that explains:\n- What the overall Sources module is about\n- How the sub-modules relate to each other\n- Key workflows that span multiple sub-modules\n\nI should NOT re-read source code or repeat what's in individual docs. I should synthesize how they work together.\n\nLet me create a Mermaid diagram that shows how the modules relate, then write the narrative.\n</think>\n\n# Sources — CodexBar\n\nThe Sources module is the complete codebase for **CodexBar**, a macOS menu bar application that integrates AI coding assistants (Claude, Codex, Copilot) into the development workflow.\n\nThe application provides real-time usage tracking, cost monitoring, and quick provider switching — all accessible from the macOS menu bar.\n\n---\n\n## Module Overview\n\nThe codebase is organized into eight sub-modules that work together to deliver a seamless AI assistant integration experience:\n\n```mermaid\ngraph TB\n    subgraph \"User-Facing\"\n        A[CodexBar<br/>macOS Menu Bar App] --> B[CodexBarWidget<br/>macOS Widgets]\n        A --> C[CodexBarCLI<br/>Command-Line Interface]\n    end\n    \n    subgraph \"Core\"\n        D[CodexBarCore<br/>Shared Utilities]\n    end\n    \n    subgraph \"Macros\"\n        E[CodexBarMacros<br/>Swift Macros] --> D\n        F[CodexBarMacroSupport<br/>Compatibility Layer] \n    end\n    \n    subgraph \"Utilities\"\n        G[CodexBarClaudeWatchdog<br/>Process Supervisor]\n        H[CodexBarClaudeWebProbe<br/>API Endpoint Tester]\n    end\n    \n    A --> D\n    C --> D\n    E --> D\n    \n    D --> G\n    D --> H\n```\n\n---\n\n## How the Sub-Modules Work Together\n\n### Core Application Stack\n\n**[CodexBar](codexbar.md)** is the main macOS menu bar application. It presents usage statistics, cost tracking, and provider switching controls directly in the menu bar. This module orchestrates all other components.\n\n**[CodexBarCore](codexbarcore.md)** provides the shared infrastructure that both the menu bar app and CLI depend on. Key capabilities include:\n\n- Secure credential storage via Keychain (`CopilotTokenStore`, `CookieHeaderStore`)\n- Browser cookie extraction for API authentication\n- Configuration management and migration\n- Cross-platform notifications\n\n**[CodexBarMacros](codexbarmacros.md)** defines Swift macros that simplify provider registration. The `@ProviderDescriptorRegistration`, `@ProviderDescriptorDefinition`, and `@ProviderImplementationRegistration` macros reduce boilerplate by automatically generating the registration code for AI providers.\n\n### User Interfaces\n\n**[CodexBarCLI](codexbarcli.md)** provides a command-line interface for programmatic access. Developers can query usage data (`usage` command), retrieve cost metrics (`cost` command), and validate configurations — useful for CI/CD pipelines or terminal-based workflows.\n\n**[CodexBarWidget](codexbarwidget.md)** delivers macOS home screen widgets showing usage stats, cost charts, and provider quick-switching. This lets users monitor AI usage without opening the main application.\n\n### Background Services\n\n**[CodexBarClaudeWatchdog](codexbarclaudiwatchdog.md)** is a lightweight supervisor that spawns and monitors the Claude CLI process. It ensures proper cleanup when the parent application exits or when termination signals are received, preventing orphaned Claude processes.\n\n**[CodexBarClaudeWebProbe](codexbarclaudewebprobe.md)** is a diagnostic utility that tests connectivity to various Claude.ai API endpoints. It helps users and developers verify which endpoints are accessible, useful for troubleshooting authentication or network issues.\n\n---\n\n## Key Workflows\n\n### Provider Authentication Flow\n\n1. User installs an AI provider CLI (Claude, Codex, or Copilot)\n2. **CodexBarCore** detects the provider and extracts cookies/tokens from the browser Keychain\n3. The credentials are validated and stored securely\n4. **CodexBarMacros** registers the provider with the descriptor registry for discovery\n\n### Usage Tracking Flow\n\n1. Provider CLI executes (monitored by **CodexBarClaudeWatchdog** if Claude)\n2. JSONL logs are written with token usage and cost data\n3. **CodexBar** reads these logs and aggregates metrics\n4. Data is displayed in the menu bar, CLI, or widgets depending on the interface\n\n### CLI Integration\n\nDevelopers using the **CodexBarCLI** can:\n- Query real-time usage: `codexbar-cli usage`\n- Get cost breakdowns: `codexbar-cli cost`\n- Validate configs: `codexbar-cli config validate`\n\n---\n\n## Related Documentation\n\n- [CodexBar — Main Application](codexbar.md)\n- [CodexBarCore — Shared Utilities](codexbarcore.md)\n- [CodexBarMacros — Swift Macros](codexbarmacros.md)\n- [CodexBarCLI — Command-Line Interface](codexbarcli.md)\n- [CodexBarWidget — macOS Widgets](codexbarwidget.md)\n- [CodexBarClaudeWatchdog — Process Supervisor](codexbarclaudiwatchdog.md)\n- [CodexBarClaudeWebProbe — API Endpoint Tester](codexbarclaudewebprobe.md)","tests-codexbartests":"# Tests — CodexBarTests\n\n<think>\nThe user wants me to write documentation for the Tests — CodexBarTests module. Let me analyze the source code files provided to understand what this module does.\n\nLooking at the test files, I can see this is a comprehensive test suite for the CodexBar application. The tests cover:\n\n1. **AmpUsageFetcherTests** - Tests for AMP usage fetching logic, including cookie attachment, login redirect detection\n2. **AmpUsageParserTests** - Tests for parsing AMP usage data from HTML, including free tier usage parsing, error handling\n3. **AntigravityStatusProbeTests** - Tests for parsing user status from Antigravity API\n4. **AppDelegateTests** - Tests for app lifecycle and status controller initialization\n5. **AugmentStatusProbeTests** - Tests for Augment status probing and cookie domain matching\n6. **BatteryDrainDiagnosticTests** - Regression tests for battery drain issues with animation\n7. **BrowserCookieOrderLabelTests** - Tests for browser-specific cookie order labels\n8. **BrowserDetectionTests** - Tests for detecting installed browsers and cookie sources\n9. **CLIArgumentParsingTests** - Tests for CLI argument parsing\n10. **CLICostTests** - Tests for cost rendering and JSON encoding\n11. **CLIEntryTests** - Tests for CLI entry points and helper functions\n12. **CLIOutputTests** - Tests for CLI output formatting\n13. **CLIProviderSelectionTests** - Tests for provider selection in CLI\n14. **CLISnapshotTests** - Tests for rendering usage snapshots\n15. **CLIWebFallbackTests** - Tests for web fallback logic\n16. **ClaudeOAuthCredentialsStorePromptPolicyTests** - Tests for OAuth credentials store prompt policies\n17. **ClaudeOAuthCredentialsStoreSecurityCLIFallbackPolicyTests** - Tests for security CLI fallback policies\n\n\n18. **ClaudeOAuthCredentialsStoreSecurityCLITests** - Tests for security CLI credentials reading\n\nThis test module validates a menu bar application that monitors usage across multiple AI providers (Claude, Codex, Gemini, etc.), with the full source being quite extensive. The tests span authentication handling, usage tracking, CLI functionality, and integration with both web and native provider APIs.\n\nI should structure the documentation to reflect how these components work together - starting with an overview of what CodexBar does, then moving through the test organization by functional area, and finally showing how they validate the core systems like provider selection, authentication, and CLI behavior.\n</think>\n\n# CodexBarTests Module Documentation\n\n## Overview\n\nThe **CodexBarTests** module is the comprehensive test suite for the CodexBar application — a macOS menu bar utility that displays AI provider usage information (Claude Code, Codex, Gemini, Cursor, etc.) directly in the system status bar.\n\nThe test suite validates:\n- **Provider usage fetching** — Retrieving usage data from various AI services\n- **CLI functionality** — Command-line interface argument parsing, output rendering, and provider selection\n- **Browser integration** — Detecting installed browsers and importing cookies for authentication\n- **OAuth credentials** — Handling Claude OAuth tokens from the macOS keychain\n- **UI behavior** — Status bar icon animation and battery drain diagnostics\n- **Error handling** — Proper parsing and transformation of API responses\n\n---\n\n## Test Organization\n\nThe 18 test files are organized into logical groups by functionality:\n\n```mermaid\ngraph TB\n    subgraph \"Provider Usage Tests\"\n        A[AmpUsageFetcherTests]\n        B[AmpUsageParserTests]\n        C[AntigravityStatusProbeTests]\n    end\n\n    subgraph \"CLI Tests\"\n        D[CLIArgumentParsingTests]\n        E[CLICostTests]\n        F[CLIEntryTests]\n        G[CLIOutputTests]\n        H[CLIProviderSelectionTests]\n        I[CLISnapshotTests]\n        J[CLIWebFallbackTests]\n    end\n\n    subgraph \"Authentication & Credentials\"\n        K[ClaudeOAuthCredentialsStorePromptPolicyTests]\n        L[ClaudeOAuthCredentialsStoreSecurityCLIFallbackPolicyTests]\n        M[ClaudeOAuthCredentialsStoreSecurityCLITests]\n    end\n\n    subgraph \"Browser & System Integration\"\n        N[BrowserCookieOrderLabelTests]\n        O[BrowserDetectionTests]\n    end\n\n    subgraph \"UI & App Lifecycle\"\n        P[AppDelegateTests]\n        Q[BatteryDrainDiagnosticTests]\n    end\n\n    R[AugmentStatusProbeTests]\n```\n\n---\n\n## Provider Usage Tests\n\nThese tests verify that usage data is correctly fetched and parsed from various AI provider APIs.\n\n### AmpUsageFetcherTests\n\nTests the `AmpUsageFetcher` component that handles requests to Amp (formerly Augment Code):\n\n| Test | Validates |\n|------|-----------|\n| `attachesCookieForAmpHosts` | Cookie header is attached only for AMP host domains (`ampcode.com`, `app.ampcode.com`, etc.) |\n| `rejectsNonAmpHosts` | Non-AMP domains and spoofed domains (e.g., `ampcode.com.evil.com`) are rejected |\n| `detectsLoginRedirects` | Login URLs (`/auth/sign-in`, `/auth/sso`, `/login`, `/signin`) are correctly identified |\n| `ignoresNonLoginURLs` | Settings, sign-out, and other non-login paths are not treated as login redirects |\n\n### AmpUsageParserTests\n\nTests HTML parsing for Amp's free tier usage data:\n\n- **Free tier parsing** — Extracts quota, used amount, hourly replenishment rate, and window hours from embedded JavaScript (`__sveltekit_x.data`)\n- **Prefetched key parsing** — Handles the alternate data key `w6b2h6/getFreeTierUsage/`\n- **Error handling** — Throws `parseFailed` when usage data is missing, `notLoggedIn` when signed out\n- **Usage snapshot conversion** — Clamps percentages to 100%, handles missing window/replenishment values\n\n### AntigravityStatusProbeTests\n\nValidates parsing of the Antigravity API user status response, including model quotas, remaining fractions, and reset times.\n\n---\n\n## CLI Tests\n\nThe CLI tests validate the command-line interface (`codexbar` command) that displays usage information in the terminal.\n\n### CLIArgumentParsingTests\n\nTests argument parsing for the `usage` subcommand:\n\n- `--json` shortcut enables JSON format without enabling JSON logging\n- `--json-output` flag enables structured logging output\n- `--log-level` and `--verbose` are correctly parsed\n- Format option (`--format text`) overrides the JSON shortcut\n- `--json-only` forces JSON-only output mode\n\n### CLICostTests\n\nTests the `cost` subcommand:\n\n- Renders cost snapshots in text format with proper formatting\n- Encodes cost payloads to JSON with correct field names (including cache read/creation tokens)\n\n### CLIEntryTests\n\nTests core CLI entry points:\n\n- Default command resolution (defaults to `usage` when no command provided)\n- Format decoding from parsed arguments\n- Provider selection logic with override support\n- Version normalization\n- Header generation\n- Exit code mapping for various error types\n\n### CLIProviderSelectionTests\n\nValidates provider selection from CLI arguments:\n\n- Help text includes all supported providers\n- `--source` and `--web-timeout` flags are documented\n- Provider override respects explicit selection\n- \"All\" selection includes all enabled providers\n- Primary pair (Codex + Claude) uses both by default\n- Alias resolution (e.g., `kiro-cli` → `.kiro`)\n\n### CLISnapshotTests\n\nTests rendering of usage snapshots:\n\n- **Text rendering** — Correctly displays session percentage, weekly percentage, credits, account info, plan name\n- **Provider-specific output** — Handles providers without weekly tracking, unlimited plans (Warp), credit-based plans\n- **JSON encoding** — Produces valid JSON with correct date formatting\n- **Color output** — Uses ANSI colors when TTY detected, applies correct colors for different usage levels\n- **Status line** — Shows provider status (operational, degraded, critical) with appropriate coloring\n\n### CLIWebFallbackTests\n\nTests the fallback logic when primary data sources fail:\n\n- **Codex web fallback** — Falls back when cookies missing, account mismatch, access denied, or dashboard requires login\n- **Claude CLI fallback** — Falls back to web only in app runtime with `.auto` source mode and valid cookies available\n- **Claude web fallback** — Disabled for app `.auto` mode (uses native API instead)\n\n---\n\n## Authentication & Credentials Tests\n\nThese tests cover the OAuth credentials handling for Claude, including keychain integration.\n\n### ClaudeOAuthCredentialsStorePromptPolicyTests\n\nTests prompt policy enforcement for keychain access:\n\n| Scenario | Expected Behavior |\n|----------|-------------------|\n| Background + `.onlyOnUserAction` mode | Returns `.notFound` without prompting |\n| User-initiated + `.onlyOnUserAction` mode | Successfully reads credentials |\n| Pre-alert suppressed when readable without interaction | No pre-alert shown |\n| Pre-alert shown when interaction required | Pre-alert triggered |\n| Security CLI experimental reader succeeds | Skips pre-alert |\n| Security CLI fails, fallback needs interaction | Pre-alert shown |\n\n### ClaudeOAuthCredentialsStoreSecurityCLIFallbackPolicyTests\n\nTests the security CLI fallback policy:\n\n- Background fallback is blocked when stored mode is `.onlyOnUserAction`\n- Sync from keychain without prompt respects stored policy\n\n### ClaudeOAuthCredentialsStoreSecurityCLITests\n\nTests the experimental security CLI reader:\n\n- Prefers security CLI for non-interactive loads\n- Background loads still execute security CLI read\n- Falls back to keychain when security CLI unavailable\n\n---\n\n## Browser & System Integration Tests\n\n### BrowserDetectionTests\n\nTests browser detection for cookie import:\n\n- **Safari** — Always detected as installed\n- **Chrome** — Requires profile data in `~/Library/Application Support/Google/Chrome/Default/`\n- **Dia** — Requires profile data in `~/Library/Application Support/Dia/User Data/Default/`\n- **Firefox** — Requires default profile directory with `cookies.sqlite`\n- **Filtering** — Returns only browsers with usable cookie stores, preserves preference order\n\n### BrowserCookieOrderLabelTests\n\nTests that error messages include browser-specific login hints (e.g., \"Open Chrome and sign in to...\").\n\n### AugmentStatusProbeTests\n\nTests the Augment status probe and cookie domain matching:\n\n- **Debug probe** — Returns formatted output with timestamp, status, credits balance\n- **Ring buffer** — Maintains at most 5 recent dumps\n- **Cookie domain matching** — Correctly handles exact match, parent domain, wildcard domain, and rejects mismatched domains\n\n---\n\n## UI & App Lifecycle Tests\n\n### AppDelegateTests\n\nTests app lifecycle and controller initialization:\n\n- Status controller is NOT built during `configure()`\n- Status controller IS built once `applicationDidFinishLaunching` is called\n- Subsequent launch notifications are idempotent (controller built only once)\n\n### BatteryDrainDiagnosticTests\n\nRegression tests for GitHub issues #269 and #139 (battery drain from animation):\n\n| Condition | Expected Animation State |\n|-----------|-------------------------|\n| All providers disabled | No animation |\n| Enabled provider with data | No animation |\n| Enabled provider without data | Animates |\n\n---\n\n## Key Testing Patterns\n\n### Test Framework\n\nThe module uses Swift Testing (`@Suite`, `@Test`) for most tests, with some XCTest compatibility:\n\n```swift\n@Suite\nstruct AmpUsageFetcherTests {\n    @Test\n    func attachesCookieForAmpHosts() {\n        #expect(AmpUsageFetcher.shouldAttachCookie(to: URL(string: \"https://ampcode.com/settings\")))\n    }\n}\n```\n\n### Dependency Injection\n\nTests use dependency injection and test doubles:\n\n```swift\n// Override factory for testing\nStatusItemController.factory = { _, _, _, _, _ in\n    return DummyStatusController()\n}\ndefer { StatusItemController.factory = StatusItemController.defaultFactory }\n```\n\n### Override Mechanisms\n\nComplex components (like OAuth credentials) provide testing hooks:\n\n```swift\ntry KeychainCacheStore.withServiceOverrideForTesting(service) {\n    try KeychainAccessGate.withTaskOverrideForTesting(false) {\n        // Test keychain behavior without actual system keychain\n    }\n}\n```\n\n---\n\n## Running the Tests\n\n```bash\n# Run all CodexBarTests\nswift test --filter CodexBarTests\n\n# Run specific test suite\nswift test --filter AmpUsageFetcherTests\nswift test --filter CLIArgumentParsingTests\n\n# Run with code coverage\nswift test --enable-code-coverage --filter CodexBarTests\n```\n\n---\n\n## Related Modules\n\nThe tests in this module exercise functionality from:\n\n| Production Module | Purpose |\n|------------------|---------|\n| **CodexBarCore** | Core usage fetching, parsing, and provider abstraction |\n| **CodexBar** | macOS menu bar app (AppDelegate, StatusItemController) |\n| **CodexBarCLI** | Command-line interface |\n| **SweetCookieKit** | Browser cookie import utilities |\n\n---\n\n## Maintenance Notes\n\n- Tests marked `@MainActor` must run on the main thread (AppKit/UIKit dependencies)\n- Some tests create temporary directories/files and clean up in `defer` blocks\n- The ring buffer in `AugmentStatusProbe` is shared across tests — some tests account for this\n- Battery drain tests conditionally skip in CI environments to avoid NSStatusBar issues","tests":"# Tests\n\n<think>\nLooking at the test files, I can see this is a test suite for the CodexBar application. Let me analyze the structure:\n\n1. **AmpUsageFetcherTests** - Tests for AMP usage fetching logic\n2. **AmpUsageParserTests** - Tests for parsing AMP usage data\n3. **AntigravityStatusProbeTests** - Tests for user status parsing\n4. **AppDelegateTests** - Tests for app lifecycle\n5. **AugmentStatusProbeTests** - Tests for Augment status probing\n\nI need to write documentation for the \"Tests — CodexBarTests\" module that synthesizes these child modules without repeating their individual content.\n\nLet me structure this as:\n- Brief overview of what this test module covers\n- How the sub-modules work together\n- A diagram showing relationships (if useful)\n- Links to child pages\n\nThe tests appear to cover:\n- App lifecycle (AppDelegateTests)\n- External service integration (AntigravityStatusProbeTests, AugmentStatusProbeTests)\n- AMP usage tracking (AmpUsageFetcherTests, AmpUsageParserTests)\n\nThese relate to the main application which monitors AMP usage and user status across different services.\n</think>\n\n# Tests — CodexBarTests\n\nThis module contains the test suite for CodexBar, covering app lifecycle, external service integration, and AMP usage tracking. The tests verify the application's core functionality through isolated unit tests.\n\n## Scope\n\nThe test module validates three main functional areas:\n\n- **App Initialization** — Ensures the application bootstraps correctly and initializes its status controllers\n- **Status Probing** — Verifies integration with external services (Antigravity and Augment) for user status detection\n- **Usage Tracking** — Tests fetching and parsing of AMP usage data from the external service\n\n## Sub-modules\n\n| Test Module | Purpose |\n|-------------|---------|\n| [AmpUsageFetcherTests](tests-codexbar-tests-ampusagefetcher.md) | Validates HTTP requests for AMP usage data, including cookie handling and redirect detection |\n| [AmpUsageParserTests](tests-codexbar-tests-ampusageparser.md) | Tests HTML parsing logic for extracting free tier usage metrics |\n| [AntigravityStatusProbeTests](tests-codexbar-tests-antigravitystatusprobe.md) | Verifies parsing of user status responses from the Antigravity API |\n| [AppDelegateTests](tests-codexbar-tests-appdelegate.md) | Tests app lifecycle events and status controller initialization |\n| [AugmentStatusProbeTests](tests-codexbar-tests-augmentstatusprobe.md) | Validates Augment service status probing logic |\n\n## Test Organization\n\nEach sub-module tests a specific component in isolation, using mocked dependencies to avoid network calls. This approach enables fast test execution and deterministic validation of component behavior.\n\nThe tests follow a layered pattern: lower-level parsers (like `AmpUsageParser`) are tested independently, then the fetchers that use them are validated with mock responses, and finally the integration points (status probes) are verified against expected response formats.","testslinux":"# TestsLinux\n\n<think>\nThe user wants me to write documentation for the TestsLinux module. Let me analyze the source code to understand what this module does.\n\nLooking at the two test files:\n\n1. **JetBrainsParserLinuxTests.swift** - Tests for a regex-based XML parser used on Linux. The tests verify parsing of JetBrains AI Assistant quota files. Key observations:\n   - Tests a class/function called `JetBrainsStatusProbe` with a `parseXMLData` method\n   - Tests various XML parsing scenarios including:\n     - Quota XML with both options (quotaInfo and nextRefill)\n     - Quota XML with only quotaInfo\n     - XML with reversed attribute order\n     - HTML entities handling\n     - Missing quotaInfo (throws error)\n     - Missing component (throws error)\n     - Empty quotaInfo (throws error)\n     - XML with single quotes\n   - Tests expect a `JetBrainsStatusProbeError.noQuotaInfo` error\n\n2. **PlatformGatingTests.swift** - Tests for platform-specific behavior:\n   - Tests that `ClaudeWebAPIFetcher` is not supported on Linux\n   - Tests various methods of `ClaudeWebAPIFetcher` that should throw `.notSupportedOnThisPlatform` error on Linux\n\nThe module is about:\n- Testing a Linux-specific XML parser (regex-based, not using libxml2)\n- Testing platform gating for features not available on Linux\n\nThe call graph shows no internal calls or execution flows, which makes sense for test files.\n\nNow I need to write documentation that:\n1. Explains the purpose of this module\n2. Describes how the components work\n3. Explains the connection to the rest of the codebase\n4. Uses appropriate structure\n\nLet me think about the structure:\n- Overview/Purpose\n- Test Structure (the two test suites)\n- Key Components (JetBrainsStatusProbe, ClaudeWebAPIFetcher platform gating)\n- How it connects to the codebase\n- Maybe a small diagram showing the relationship\n\n\n- I'll write clear, developer-focused documentation that explains the purpose and functionality of these test suites.\n</think>\n\n# TestsLinux Module\n\n## Overview\n\nThe **TestsLinux** module contains platform-specific tests for Linux environments. It validates two distinct concerns:\n\n1. **Regex-based XML parsing** — A fallback parser for JetBrains IDE quota files that doesn't depend on libxml2\n2. **Platform gating** — Tests verifying that macOS/Windows-only features properly reject Linux execution\n\nThese tests ensure that platform-specific code paths behave correctly when running on Linux build agents.\n\n---\n\n## JetBrainsParserLinuxTests\n\nThis test suite validates the `JetBrainsStatusProbe.parseXMLData()` function — a regex-based XML parser used exclusively on Linux. Unlike the macOS implementation (which uses libxml2), this parser uses pattern matching to extract quota information from JetBrains IDE configuration files.\n\n### What It Tests\n\n| Test | Purpose |\n|------|---------|\n| `parsesQuotaXMLWithBothOptions` | Verifies parsing of complete quota data including `quotaInfo` and `nextRefill` fields |\n| `parsesQuotaXMLWithOnlyQuotaInfo` | Tests parsing when only `quotaInfo` is present |\n| `parsesXMLWithReversedAttributeOrder` | Ensures the parser handles `value=\"...\"` before `name=\"...\"` attribute order |\n| `handlesHTMLEntities` | Confirms proper decoding of `&quot;`, `&#10;`, etc. |\n| `throwsOnMissingQuotaInfo` | Validates error handling when the `quotaInfo` option is absent |\n| `throwsOnMissingComponent` | Validates error when the target component (`AIAssistantQuotaManager2`) doesn't exist |\n| `throwsOnEmptyQuotaInfo` | Ensures empty `value` attributes produce an error |\n| `parsesXMLWithSingleQuotes` | Tests that single-quoted attributes are handled correctly |\n\n### Expected Errors\n\nThe parser throws `JetBrainsStatusProbeError.noQuotaInfo` when:\n- The `<component name=\"AIAssistantQuotaManager2\">` element is missing\n- The `<option name=\"quotaInfo\">` attribute is missing or empty\n\n---\n\n## PlatformGatingTests\n\nThis suite verifies that features requiring macOS or Windows are properly gated on Linux. It tests the `ClaudeWebAPIFetcher` class, which is no
